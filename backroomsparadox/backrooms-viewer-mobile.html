<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Backrooms Paradox Viewer</title>
  <style>
    :root {
      --bg: #070709;
      --surface: rgba(16, 16, 22, 0.88);
      --surface-strong: rgba(18, 18, 25, 0.96);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f4f4f7;
      --muted: #a9acba;
      --muted-2: #7f8091;
      --accent: #be1a48;
      --shadow-lg: 0 18px 40px rgba(0, 0, 0, 0.35);
      --shadow-md: 0 10px 24px rgba(0, 0, 0, 0.24);

      --node-width: 120px;
      --node-max-width: 165px;
      --node-port-width: 120px;

      --top-gap: calc(10px + env(safe-area-inset-top));
      --side-gap: 10px;
      --bottom-gap: calc(10px + env(safe-area-inset-bottom));
    }

    * {
      box-sizing: border-box;
      min-width: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at top left, rgba(190, 26, 72, 0.08), transparent 28%),
        radial-gradient(circle at 90% 12%, rgba(255,255,255,0.03), transparent 18%),
        linear-gradient(180deg, #0a0a0d 0%, #070709 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.10;
      background-image:
        radial-gradient(1px 1px at 12% 20%, rgba(255,255,255,0.85), transparent),
        radial-gradient(1px 1px at 30% 72%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.3px 1.3px at 52% 40%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 81% 58%, rgba(255,255,255,0.7), transparent);
    }

    #app {
      position: fixed;
      inset: 0;
      z-index: 2;
      overflow: hidden;
    }

    .glass {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .topOverlay {
      position: fixed;
      top: var(--top-gap);
      left: var(--side-gap);
      right: var(--side-gap);
      z-index: 30;
      display: grid;
      gap: 8px;
      pointer-events: none;
    }

    .topCard {
      border-radius: 16px;
      padding: 10px;
      pointer-events: auto;
    }

    .searchWrap {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #searchInput {
      width: 100%;
      min-width: 0;
      background: rgba(22, 22, 30, 0.96);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }

    #searchInput:focus {
      border-color: rgba(190, 26, 72, 0.42);
      box-shadow: 0 0 0 4px rgba(190, 26, 72, 0.10);
      background: rgba(26, 26, 34, 0.98);
    }

    .miniStat {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #d8dae5;
      font-size: 12px;
      font-weight: 700;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      pointer-events: auto;
    }

    button {
      appearance: none;
      background: rgba(255,255,255,0.05);
      color: #ececf4;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      padding: 10px 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
      font-family: inherit;
      min-height: 42px;
    }

    button:active {
      transform: scale(0.98);
    }

    .primaryBtn {
      background: linear-gradient(180deg, rgba(190, 26, 72, 0.95), rgba(148, 16, 53, 0.98));
      border-color: rgba(255,255,255,0.06);
      color: #fff;
      box-shadow: 0 8px 18px rgba(190, 26, 72, 0.22);
    }

    #graphViewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      user-select: none;
      cursor: grab;
      touch-action: none;
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        radial-gradient(circle at top left, rgba(190, 26, 72, 0.07), transparent 32%),
        linear-gradient(180deg, rgba(8,8,12,0.98), rgba(5,5,9,0.99));
      background-size: 34px 34px, 34px 34px, auto, auto;
    }

    #graphViewport.panning {
      cursor: grabbing;
    }

    #graphScene {
      position: absolute;
      inset: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    #graphSvg {
      position: absolute;
      inset: 0;
      overflow: visible;
      pointer-events: none;
    }

    .line-base {
      fill: none;
      stroke: rgba(255,255,255,0.17);
      stroke-width: 2.2;
      stroke-linecap: round;
    }

    .line-related {
      fill: none;
      stroke: rgba(190, 26, 72, 0.96);
      stroke-width: 2.9;
      stroke-linecap: round;
      filter: drop-shadow(0 0 8px rgba(190,26,72,0.40));
    }

    .line-dimmed {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 1.7;
      stroke-linecap: round;
    }

    .edgeLabel {
      fill: rgba(230,230,236,0.94);
      font-size: 10px;
      font-weight: 700;
      paint-order: stroke;
      stroke: rgba(0,0,0,0.65);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    #graphNodes {
      position: absolute;
      inset: 0;
      overflow: visible;
    }

    .node {
      position: absolute;
      width: var(--node-width);
      max-width: var(--node-max-width);
      padding: 8px 8px 7px;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(25,28,38,0.98), rgba(17,19,28,0.98));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 8px 18px rgba(0,0,0,0.42),
        inset 0 1px 0 rgba(255,255,255,0.04);
      transform: translate(-50%, -50%);
      transition: box-shadow .14s ease, border-color .14s ease, opacity .14s ease, transform .14s ease;
      backdrop-filter: blur(5px);
      cursor: pointer;
    }

    .node.selected {
      border-color: rgba(190,26,72,0.72);
      box-shadow:
        0 0 0 3px rgba(190,26,72,0.22),
        0 14px 24px rgba(0,0,0,0.56);
      z-index: 30;
    }

    .node.related {
      border-color: rgba(255,255,255,0.16);
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.05),
        0 12px 20px rgba(0,0,0,0.45);
    }

    .node.dimmed {
      opacity: 0.35;
    }

    .node.start {
      background: linear-gradient(180deg, rgba(50,42,24,0.98), rgba(26,22,15,0.98));
    }

    .node.progression {
      background: linear-gradient(180deg, rgba(26,35,60,0.98), rgba(17,21,34,0.98));
    }

    .node.danger {
      background: linear-gradient(180deg, rgba(60,26,32,0.98), rgba(32,16,20,0.98));
    }

    .node.weird {
      background: linear-gradient(180deg, rgba(47,29,70,0.98), rgba(24,16,36,0.98));
    }

    .nodeHeader {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nodeDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .node.start .nodeDot { background: #d7b45a; }
    .node.progression .nodeDot { background: #7aa2ff; }
    .node.danger .nodeDot { background: #ff7f7f; }
    .node.weird .nodeDot { background: #a77cff; }

    .nodeTitle {
      font-size: 11px;
      font-weight: 800;
      color: #f5f5f7;
      line-height: 1.15;
      word-break: break-word;
    }

    .nodeSubtitle {
      margin-top: 3px;
      font-size: 9px;
      line-height: 1.3;
      color: #9ea3b7;
      word-break: break-word;
    }

    .nodeStatusRow {
      margin-top: 6px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .nodeBadge {
      display: inline-flex;
      align-items: center;
      font-size: 8.5px;
      font-weight: 700;
      padding: 3px 5px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.04);
      color: #cbd0df;
    }

    .nodePopup {
      position: fixed;
      z-index: 45;
      width: min(280px, calc(100vw - 20px));
      max-height: min(54dvh, 390px);
      overflow: auto;
      border-radius: 16px;
      padding: 10px;
      background: rgba(18, 18, 25, 0.97);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 18px 40px rgba(0,0,0,0.38);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transform: translate3d(0, 0, 0);
    }

    .nodePopup.hidden {
      display: none;
    }

    .nodePopupHeader {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .nodePopupTitleWrap {
      min-width: 0;
      flex: 1;
    }

    .nodePopupTitle {
      font-size: 13px;
      font-weight: 800;
      color: #f5f5f7;
      line-height: 1.2;
      word-break: break-word;
    }

    .nodePopupSub {
      margin-top: 3px;
      font-size: 11px;
      color: #a9acba;
      line-height: 1.35;
      word-break: break-word;
    }

    .nodePopupClose {
      flex: 0 0 auto;
      width: 34px;
      min-width: 34px;
      height: 34px;
      min-height: 34px;
      padding: 0;
      border-radius: 10px;
    }

    .nodePopupBody {
      display: grid;
      gap: 9px;
    }

    .popupBlock {
      display: grid;
      gap: 3px;
    }

    .popupLabel {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7f8091;
      font-weight: 700;
    }

    .popupValue {
      font-size: 12px;
      line-height: 1.4;
      color: #ececf4;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .popupList {
      margin: 0;
      padding-left: 16px;
      font-size: 12px;
      line-height: 1.4;
      color: #d7dae5;
    }

    .popupList li + li {
      margin-top: 4px;
    }

    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(4,4,8,0.82);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #loadingCard {
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 20px;
      text-align: center;
      box-shadow: var(--shadow-lg);
      min-width: 200px;
      max-width: calc(100vw - 30px);
    }

    #loadingText {
      font-size: 13px;
      color: #e2e2ea;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid rgba(255,255,255,0.10);
      border-top: 3px solid #be1a48;
      border-radius: 50%;
      animation: spin 0.95s linear infinite;
      margin: 0 auto 14px;
    }

    #errorPanel {
      position: fixed;
      top: var(--top-gap);
      left: var(--side-gap);
      right: var(--side-gap);
      z-index: 60;
      background: rgba(36, 13, 18, 0.96);
      border: 1px solid rgba(255, 138, 138, 0.28);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 14px 28px rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);
      display: none;
    }

    #errorPanel.show {
      display: block;
    }

    #errorPanelTitle {
      font-size: 14px;
      font-weight: 800;
      color: #ffced6;
      margin-bottom: 6px;
    }

    #errorPanelText {
      font-size: 13px;
      line-height: 1.5;
      color: #f6d9df;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 640px) {
      .toolbar {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      button {
        font-size: 11px;
        min-height: 40px;
      }

      .miniStat {
        max-width: 120px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    }

    @media (max-width: 390px) {
      :root {
        --node-width: 108px;
        --node-max-width: 142px;
        --node-port-width: 108px;
      }

      .toolbar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .nodePopup {
        width: min(250px, calc(100vw - 16px));
      }
    }

    @media (min-width: 900px) {
      :root {
        --node-width: 145px;
        --node-max-width: 210px;
        --node-port-width: 145px;
      }

      .topOverlay {
        left: 16px;
        right: 16px;
        max-width: 760px;
      }
    }
  </style>
</head>
<body>
  <div id="loadingOverlay">
    <div id="loadingCard">
      <div class="spinner"></div>
      <div id="loadingText">Loading graph...</div>
    </div>
  </div>

  <div id="errorPanel">
    <div id="errorPanelTitle">Couldn’t load viewer</div>
    <div id="errorPanelText">Try refreshing or check your connection.</div>
  </div>

  <div id="app">
    <div class="topOverlay">
      <div class="topCard glass">
        <div class="searchWrap">
          <input id="searchInput" type="text" placeholder="Search levels..." autocomplete="off" />
          <div class="miniStat" id="statSelected">No selection</div>
        </div>
      </div>

      <div class="topCard glass toolbar">
        <button onclick="zoomBy(1.12)">+</button>
        <button onclick="zoomBy(1 / 1.12)">−</button>
        <button onclick="resetView()">Reset</button>
        <button onclick="fitToGraph()">Fit</button>
        <button onclick="clearSelection()">Clear</button>
        <button class="primaryBtn" onclick="reloadGraph()">Refresh</button>
      </div>
    </div>

    <div id="graphViewport">
      <div id="graphScene">
        <svg id="graphSvg"></svg>
        <div id="graphNodes"></div>
      </div>
    </div>

    <div id="nodePopup" class="nodePopup hidden">
      <div class="nodePopupHeader">
        <div class="nodePopupTitleWrap">
          <div id="popupTitle" class="nodePopupTitle">Selected Level</div>
          <div id="popupSub" class="nodePopupSub">Tap a node to inspect it</div>
        </div>
        <button class="nodePopupClose" onclick="clearSelection()">×</button>
      </div>

      <div class="nodePopupBody">
        <div class="popupBlock">
          <div class="popupLabel">Type</div>
          <div class="popupValue" id="popupType">—</div>
        </div>

        <div class="popupBlock">
          <div class="popupLabel">Status</div>
          <div class="popupValue" id="popupStatus">—</div>
        </div>

        <div class="popupBlock">
          <div class="popupLabel">Subtitle</div>
          <div class="popupValue" id="popupSubtitle">—</div>
        </div>

        <div class="popupBlock">
          <div class="popupLabel">Tags</div>
          <div class="popupValue" id="popupTags">—</div>
        </div>

        <div class="popupBlock">
          <div class="popupLabel">Description</div>
          <div class="popupValue" id="popupDescription">—</div>
        </div>

        <div class="popupBlock">
          <div class="popupLabel">Outgoing</div>
          <ul id="popupOutgoing" class="popupList">
            <li>None</li>
          </ul>
        </div>

        <div class="popupBlock">
          <div class="popupLabel">Incoming</div>
          <ul id="popupIncoming" class="popupList">
            <li>None</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <script>
    const RAW_JSON_URL = "https://raw.githubusercontent.com/fluxsaloris/Roadmap/main/backroomsparadox/backrooms-levels.json";

    let graphData = { nodes: [], edges: [] };
    let selectedNodeId = null;
    let currentSearch = "";

    let viewportState = {
      x: 0,
      y: 0,
      scale: window.innerWidth <= 700 ? 0.52 : 0.75
    };

    let interaction = {
      isPanning: false,
      panStartMouseX: 0,
      panStartMouseY: 0,
      panStartX: 0,
      panStartY: 0
    };

    const graphViewport = () => document.getElementById("graphViewport");
    const graphScene = () => document.getElementById("graphScene");
    const graphSvg = () => document.getElementById("graphSvg");
    const graphNodesEl = () => document.getElementById("graphNodes");
    const nodePopup = () => document.getElementById("nodePopup");

    function showLoading(text = "Loading graph...") {
      document.getElementById("loadingText").textContent = text;
      document.getElementById("loadingOverlay").style.display = "flex";
    }

    function hideLoading() {
      document.getElementById("loadingOverlay").style.display = "none";
    }

    function showErrorPanel(message) {
      document.getElementById("errorPanelText").textContent = message;
      document.getElementById("errorPanel").classList.add("show");
    }

    function hideErrorPanel() {
      document.getElementById("errorPanel").classList.remove("show");
    }

    function normalizeData(raw) {
      return {
        nodes: Array.isArray(raw?.nodes)
          ? raw.nodes.map((n) => ({
              id: String(n.id ?? ""),
              label: typeof n.label === "string" ? n.label : "Unnamed",
              subtitle: typeof n.subtitle === "string" ? n.subtitle : "",
              description: typeof n.description === "string" ? n.description : "",
              notes: typeof n.notes === "string" ? n.notes : "",
              x: typeof n.x === "number" ? n.x : 0,
              y: typeof n.y === "number" ? n.y : 0,
              type: typeof n.type === "string" ? n.type : "progression",
              status: typeof n.status === "string" ? n.status : "draft",
              tags: Array.isArray(n.tags) ? n.tags.map(tag => String(tag)) : []
            }))
          : [],
        edges: Array.isArray(raw?.edges)
          ? raw.edges.map((e) => ({
              from: String(e.from ?? ""),
              to: String(e.to ?? ""),
              label: typeof e.label === "string" ? e.label : "",
              oneWay: e.oneWay === false ? false : true
            }))
          : []
      };
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getNodeById(id) {
      return graphData.nodes.find(n => n.id === String(id)) || null;
    }

    function getSelectedNode() {
      return selectedNodeId ? getNodeById(selectedNodeId) : null;
    }

    function getOutgoingEdges(id) {
      return graphData.edges.filter(edge => edge.from === String(id));
    }

    function getIncomingEdges(id) {
      return graphData.edges.filter(edge => edge.to === String(id));
    }

    function nodeMatchesSearch(node, search) {
      if (!search) return true;
      const hay = [
        node.id,
        node.label,
        node.subtitle,
        node.description,
        node.notes,
        ...(Array.isArray(node.tags) ? node.tags : [])
      ].join(" ").toLowerCase();
      return hay.includes(search);
    }

    function getVisibleNodeIds() {
      const search = currentSearch.trim().toLowerCase();
      if (!search) return new Set(graphData.nodes.map(n => n.id));
      return new Set(graphData.nodes.filter(n => nodeMatchesSearch(n, search)).map(n => n.id));
    }

    function getRelatedNodeIds(nodeId) {
      const related = new Set([String(nodeId)]);
      for (const edge of graphData.edges) {
        if (edge.from === String(nodeId)) related.add(edge.to);
        if (edge.to === String(nodeId)) related.add(edge.from);
      }
      return related;
    }

    function scenePointFromClient(clientX, clientY) {
      const rect = graphViewport().getBoundingClientRect();
      return {
        x: (clientX - rect.left - viewportState.x) / viewportState.scale,
        y: (clientY - rect.top - viewportState.y) / viewportState.scale
      };
    }

    function getNodeScreenPosition(node) {
      const rect = graphViewport().getBoundingClientRect();
      return {
        x: rect.left + viewportState.x + node.x * viewportState.scale,
        y: rect.top + viewportState.y + node.y * viewportState.scale
      };
    }

    function applyViewportTransform() {
      graphScene().style.transform =
        `translate(${viewportState.x}px, ${viewportState.y}px) scale(${viewportState.scale})`;

      if (selectedNodeId) {
        updateNodePopupPosition();
      }
    }

    function getGraphBounds(nodes) {
      if (!nodes.length) {
        return { minX: 0, maxX: 1000, minY: 0, maxY: 600 };
      }

      const minX = Math.min(...nodes.map(n => n.x));
      const maxX = Math.max(...nodes.map(n => n.x));
      const minY = Math.min(...nodes.map(n => n.y));
      const maxY = Math.max(...nodes.map(n => n.y));

      return { minX, maxX, minY, maxY };
    }

    function fitToGraph() {
      const visibleNodeIds = getVisibleNodeIds();
      const visibleNodes = graphData.nodes.filter(node => visibleNodeIds.has(node.id));
      const nodesToFit = visibleNodes.length ? visibleNodes : graphData.nodes;
      const bounds = getGraphBounds(nodesToFit);

      const mobile = window.innerWidth <= 700;
      const width = Math.max(300, bounds.maxX - bounds.minX + (mobile ? 160 : 280));
      const height = Math.max(220, bounds.maxY - bounds.minY + (mobile ? 140 : 220));

      const rect = graphViewport().getBoundingClientRect();
      const fitScale = Math.min(
        mobile ? 0.78 : 0.95,
        Math.max(0.16, Math.min(rect.width / width, rect.height / height))
      );

      viewportState.scale = fitScale;
      viewportState.x = rect.width / 2 - ((bounds.minX + bounds.maxX) / 2) * fitScale;
      viewportState.y = rect.height / 2 - ((bounds.minY + bounds.maxY) / 2) * fitScale;

      applyViewportTransform();
    }

    function resetView() {
      viewportState = {
        x: 20,
        y: 20,
        scale: window.innerWidth <= 700 ? 0.52 : 0.75
      };
      applyViewportTransform();
    }

    function zoomBy(factor, clientX = null, clientY = null) {
      const rect = graphViewport().getBoundingClientRect();
      const px = clientX ?? (rect.left + rect.width / 2);
      const py = clientY ?? (rect.top + rect.height / 2);

      const before = scenePointFromClient(px, py);
      viewportState.scale = Math.max(0.16, Math.min(1.5, viewportState.scale * factor));
      viewportState.x = px - rect.left - before.x * viewportState.scale;
      viewportState.y = py - rect.top - before.y * viewportState.scale;
      applyViewportTransform();
    }

    function createCurvePath(x1, y1, x2, y2) {
      const dx = Math.max(50, Math.abs(x2 - x1) * 0.40);
      return `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
    }

    function getNodePortPosition(nodeId, side) {
      const node = getNodeById(nodeId);
      if (!node) return null;
      const width = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--node-port-width')) || 120;
      return {
        x: node.x + (side === "output" ? width / 2 : -width / 2),
        y: node.y
      };
    }

    function updateTopStats() {
      const selected = getSelectedNode();
      document.getElementById("statSelected").textContent =
        selected ? (selected.label || selected.id) : "No selection";
    }

    function hideNodePopup() {
      nodePopup().classList.add("hidden");
    }

    function updateNodePopupPosition() {
      const node = getSelectedNode();
      if (!node) {
        hideNodePopup();
        return;
      }

      const popup = nodePopup();
      const screen = getNodeScreenPosition(node);

      const gap = 14;
      const margin = 10;
      const popupWidth = popup.offsetWidth || 280;
      const popupHeight = popup.offsetHeight || 240;
      const safeTop = 10;
      const safeBottom = 10;

      let left = screen.x + 26;
      let top = screen.y - popupHeight / 2;
      let placedBeside = true;

      if (left + popupWidth > window.innerWidth - margin) {
        left = screen.x - popupWidth - 26;
      }

      if (left < margin) {
        placedBeside = false;
      }

      if (placedBeside) {
        if (top < safeTop) top = safeTop;
        const maxTop = window.innerHeight - popupHeight - safeBottom;
        if (top > maxTop) top = Math.max(safeTop, maxTop);
      } else {
        left = screen.x - popupWidth / 2;
        top = screen.y - popupHeight - gap;

        if (top < safeTop) {
          top = screen.y + gap;
        }

        if (left < margin) left = margin;
        if (left + popupWidth > window.innerWidth - margin) {
          left = window.innerWidth - popupWidth - margin;
        }

        if (top + popupHeight > window.innerHeight - safeBottom) {
          top = Math.max(safeTop, window.innerHeight - popupHeight - safeBottom);
        }
      }

      popup.style.left = `${left}px`;
      popup.style.top = `${top}px`;
    }

    function updateNodePopup() {
      const node = getSelectedNode();

      if (!node) {
        hideNodePopup();
        return;
      }

      document.getElementById("popupTitle").textContent = node.label || node.id;
      document.getElementById("popupSub").textContent =
        `${node.type || "progression"} • ${node.status || "draft"}`;

      document.getElementById("popupType").textContent = node.type || "—";
      document.getElementById("popupStatus").textContent = node.status || "—";
      document.getElementById("popupSubtitle").textContent = node.subtitle || "—";
      document.getElementById("popupTags").textContent = node.tags?.length ? node.tags.join(", ") : "—";
      document.getElementById("popupDescription").textContent = node.description || "—";

      const outgoing = getOutgoingEdges(node.id);
      const incoming = getIncomingEdges(node.id);

      document.getElementById("popupOutgoing").innerHTML = outgoing.length
        ? outgoing.map(edge => {
            const target = getNodeById(edge.to);
            return `<li>${escapeHtml(target?.label || edge.to)}${edge.label ? ` — ${escapeHtml(edge.label)}` : ""}</li>`;
          }).join("")
        : "<li>No outgoing links.</li>";

      document.getElementById("popupIncoming").innerHTML = incoming.length
        ? incoming.map(edge => {
            const source = getNodeById(edge.from);
            return `<li>${escapeHtml(source?.label || edge.from)}${edge.label ? ` — ${escapeHtml(edge.label)}` : ""}</li>`;
          }).join("")
        : "<li>No incoming links.</li>";

      nodePopup().classList.remove("hidden");

      requestAnimationFrame(() => {
        updateNodePopupPosition();
      });
    }

    function refreshGraph() {
      const visibleNodeIds = getVisibleNodeIds();
      const relatedNodeIds = selectedNodeId ? getRelatedNodeIds(selectedNodeId) : null;

      graphNodesEl().innerHTML = graphData.nodes
        .filter(node => visibleNodeIds.has(node.id))
        .map(node => {
          const isSelected = node.id === selectedNodeId;
          const isRelated = relatedNodeIds ? relatedNodeIds.has(node.id) : false;
          const isDimmed = relatedNodeIds ? !isRelated : false;

          return `
            <div
              class="node ${escapeHtml(node.type || "progression")} ${isSelected ? "selected" : ""} ${isRelated && !isSelected ? "related" : ""} ${isDimmed ? "dimmed" : ""}"
              data-node-id="${escapeHtml(node.id)}"
              style="left:${node.x}px; top:${node.y}px;"
            >
              <div class="nodeHeader">
                <div class="nodeDot"></div>
                <div class="nodeTitle">${escapeHtml(node.label)}</div>
              </div>
              ${node.subtitle ? `<div class="nodeSubtitle">${escapeHtml(node.subtitle)}</div>` : ""}
              <div class="nodeStatusRow">
                <span class="nodeBadge">${escapeHtml(node.type || "progression")}</span>
                <span class="nodeBadge">${escapeHtml(node.status || "draft")}</span>
              </div>
            </div>
          `;
        }).join("");

      const svgParts = [];
      const visibleEdges = graphData.edges.filter(edge => visibleNodeIds.has(edge.from) && visibleNodeIds.has(edge.to));

      for (const edge of visibleEdges) {
        const fromPort = getNodePortPosition(edge.from, "output");
        const toPort = getNodePortPosition(edge.to, "input");
        if (!fromPort || !toPort) continue;

        const related = selectedNodeId && (edge.from === selectedNodeId || edge.to === selectedNodeId);
        const dimmed = selectedNodeId && !related;
        const path = createCurvePath(fromPort.x, fromPort.y, toPort.x, toPort.y);

        svgParts.push(`<path d="${path}" class="${related ? "line-related" : dimmed ? "line-dimmed" : "line-base"}"></path>`);

        if (edge.label) {
          const midX = (fromPort.x + toPort.x) / 2;
          const midY = (fromPort.y + toPort.y) / 2 - 8;
          svgParts.push(`<text x="${midX}" y="${midY}" text-anchor="middle" class="edgeLabel">${escapeHtml(edge.label)}</text>`);
        }
      }

      graphSvg().innerHTML = svgParts.join("");
      bindNodeEvents();
      updateTopStats();
      updateNodePopup();
    }

    function bindNodeEvents() {
      graphNodesEl().querySelectorAll(".node").forEach(nodeEl => {
        const nodeId = nodeEl.dataset.nodeId;
        nodeEl.addEventListener("click", (event) => {
          event.stopPropagation();
          selectedNodeId = nodeId;
          refreshGraph();
        });
      });
    }

    function clearSelection() {
      selectedNodeId = null;
      refreshGraph();
    }

    async function fetchRemoteGraph() {
      const res = await fetch(RAW_JSON_URL + "?v=" + Date.now(), { cache: "no-store" });
      if (!res.ok) throw new Error("Could not load backrooms-levels.json");
      return normalizeData(await res.json());
    }

    async function reloadGraph() {
      try {
        showLoading("Loading graph...");
        graphData = await fetchRemoteGraph();
        hideErrorPanel();
        hideLoading();
        refreshGraph();
        fitToGraph();
      } catch (err) {
        console.error(err);
        hideLoading();
        showErrorPanel(err.message || "Failed to load graph.");
      }
    }

    function bindViewportEvents() {
      const viewport = graphViewport();

      viewport.addEventListener("pointerdown", (event) => {
        if (event.target.closest(".node")) return;
        if (event.target.closest(".nodePopup")) return;

        interaction.isPanning = true;
        interaction.panStartMouseX = event.clientX;
        interaction.panStartMouseY = event.clientY;
        interaction.panStartX = viewportState.x;
        interaction.panStartY = viewportState.y;

        viewport.classList.add("panning");
        viewport.setPointerCapture(event.pointerId);
      });

      viewport.addEventListener("pointermove", (event) => {
        if (!interaction.isPanning) return;

        viewportState.x = interaction.panStartX + (event.clientX - interaction.panStartMouseX);
        viewportState.y = interaction.panStartY + (event.clientY - interaction.panStartMouseY);
        applyViewportTransform();
      });

      viewport.addEventListener("pointerup", () => {
        interaction.isPanning = false;
        viewport.classList.remove("panning");
      });

      viewport.addEventListener("pointercancel", () => {
        interaction.isPanning = false;
        viewport.classList.remove("panning");
      });

      viewport.addEventListener("click", (event) => {
        if (!event.target.closest(".node") && !event.target.closest(".nodePopup")) {
          clearSelection();
        }
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      bindViewportEvents();

      document.getElementById("searchInput").addEventListener("input", (event) => {
        currentSearch = event.target.value || "";
        refreshGraph();
      });

      window.addEventListener("resize", () => {
        if (graphData.nodes.length) {
          fitToGraph();
        }
      });
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) reloadGraph();
    });

    window.zoomBy = zoomBy;
    window.resetView = resetView;
    window.fitToGraph = fitToGraph;
    window.clearSelection = clearSelection;
    window.reloadGraph = reloadGraph;

    reloadGraph();
  </script>
</body>
</html>
