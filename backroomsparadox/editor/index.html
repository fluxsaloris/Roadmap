<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graph Editor</title>

  <link rel="stylesheet" href="editor.css" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      background: #0f1115;
      color: #e6e6e6;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #topbar {
      display: flex;
      gap: 8px;
      padding: 10px;
      background: #1a1d24;
      border-bottom: 1px solid #2a2f3a;
      flex-wrap: wrap;
    }

    #topbar button {
      background: #2b3140;
      color: white;
      border: none;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 6px;
    }

    #topbar button:hover {
      background: #3a4255;
    }

    #graphViewport {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #0c0e13;
    }

    #graphScene {
      position: absolute;
      inset: 0;
      transform-origin: 0 0;
    }

    #graphSvg {
      position: absolute;
      top: 0;
      left: 0;
      overflow: visible;
      pointer-events: none;
    }

    #graphNodes {
      position: absolute;
      inset: 0;
    }
  </style>
</head>
<body>
  <div id="app">

    <div id="topbar">
      <button onclick="addNode()">+ Node</button>
      <button onclick="autoLayout()">Auto Layout</button>
      <button onclick="fitToGraph()">Fit</button>
      <button onclick="resetView()">Reset</button>
      <button onclick="undoAction()">Undo</button>
      <button onclick="redoAction()">Redo</button>
      <button onclick="saveGraph()">💾 Save</button>
      <button onclick="discardLocalDraft()">Discard Draft</button>
      <button onclick="previewLatestSnapshot()">Preview Snapshot</button>

      <input
        id="searchInput"
        type="text"
        placeholder="Search nodes..."
        style="margin-left:auto; padding:6px; border-radius:6px; border:none;"
      />
    </div>

    <div id="graphViewport">
      <div id="graphScene">
        <svg id="graphSvg"></svg>
        <div id="graphNodes"></div>
      </div>
    </div>
  </div>

  <div id="errorPanel" style="display:none; position:fixed; bottom:10px; left:10px; background:#aa3333; padding:10px; border-radius:6px; z-index:10000;">
    <div id="errorPanelText"></div>
  </div>

  <div id="statusLine" style="position:fixed; bottom:10px; right:10px; background:#1a1d24; padding:8px 12px; border-radius:6px; z-index:10000;">
    Ready
  </div>

  <div id="loadingOverlay" style="position:fixed; inset:0; background:#0f1115; display:flex; align-items:center; justify-content:center; z-index:9999;">
    <div id="loadingText">Loading editor...</div>
  </div>

<script src="editor-config.js"></script>
<script src="editor-state.js"></script>
<script src="editor-ui.js"></script>
<script src="editor-graph.js"></script>
<script src="editor-actions.js"></script>
<script src="editor-init.js"></script>
</body>
</html>
