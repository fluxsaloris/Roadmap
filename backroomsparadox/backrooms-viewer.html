<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Backrooms Paradox: Level Paths</title>

<style>
:root {
  --bg: #070709;
  --text: #f4f4f7;

  --stable: #4CAF50;
  --dangerous: #E53935;
  --corrupted: #3E5F3A;
  --anomalous: #8E44AD;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Inter, Arial, sans-serif;
}

/* === GRAPH CORE === */

.graphViewport {
  position: fixed;
  inset: 0;
  overflow: hidden;
  cursor: grab;
}

.graphScene {
  position: absolute;
  inset: 0;
  transform-origin: 0 0;
}

.graphSvg {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.graphNodes {
  position: absolute;
  inset: 0;
}

/* === NODES === */

.node {
  position: absolute;
  transform: translate(-50%, -50%);
  padding: 10px;
  border-radius: 12px;
  min-width: 120px;
  background: #111;
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
}

.node.stable { background: rgba(76,175,80,0.2); }
.node.dangerous { background: rgba(229,57,53,0.2); }
.node.corrupted { background: rgba(62,95,58,0.25); }
.node.anomalous { background: rgba(142,68,173,0.25); }

.nodeDot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.node.stable .nodeDot { background: var(--stable); }
.node.dangerous .nodeDot { background: var(--dangerous); }
.node.corrupted .nodeDot { background: var(--corrupted); }
.node.anomalous .nodeDot { background: var(--anomalous); }

/* === EDGES === */

.line {
  fill: none;
  stroke-width: 2.8;
  stroke-linecap: round;
  stroke-dasharray: 8 6;
  animation: flow 2s linear infinite;
}

.line-stable { stroke: var(--stable); }
.line-dangerous { stroke: var(--dangerous); }
.line-corrupted { stroke: var(--corrupted); }
.line-anomalous { stroke: var(--anomalous); }

.line-related {
  stroke: #ffffff;
  stroke-width: 3.2;
}

.line-dimmed {
  stroke: rgba(255,255,255,0.1);
}

@keyframes flow {
  from { stroke-dashoffset: 0; }
  to { stroke-dashoffset: -24; }
}

/* === POPUP === */

#popup {
  position: fixed;
  background: #111;
  border: 1px solid #333;
  padding: 10px;
  border-radius: 10px;
  display: none;
  max-width: 240px;
}
</style>

</head>

<body>

<div class="graphViewport" id="graphViewport">
  <div class="graphScene" id="graphScene">
    <svg class="graphSvg" id="graphSvg"></svg>
    <div class="graphNodes" id="graphNodes"></div>
  </div>
</div>

<div id="popup"></div>

<script>
const URL = "https://raw.githubusercontent.com/fluxsaloris/Roadmap/main/backroomsparadox/backrooms-levels.json";

let data = { nodes: [], edges: [] };
let selected = null;

let view = { x: 0, y: 0, scale: 1 };

/* === TRANSFORM === */

function applyTransform() {
  document.getElementById("graphScene").style.transform =
    `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
}

/* === HELPERS === */

function normalizeType(type) {
  const t = String(type || "").toLowerCase();
  if (t === "stable") return "stable";
  if (t === "dangerous") return "dangerous";
  if (t === "corrupted") return "corrupted";
  if (t === "anomalous") return "anomalous";
  return "stable";
}

function getNode(id) {
  return data.nodes.find(n => String(n.id) === String(id));
}

/* === DRAW === */

function draw() {
  const nodeContainer = document.getElementById("graphNodes");
  const svg = document.getElementById("graphSvg");

  nodeContainer.innerHTML = "";
  svg.innerHTML = "";

  data.nodes.forEach(n => {
    const type = normalizeType(n.type);

    const el = document.createElement("div");
    el.className = `node ${type}`;
    el.style.left = n.x + "px";
    el.style.top = n.y + "px";

    el.innerHTML = `
      <div class="nodeDot"></div>
      <div>${n.label}</div>
    `;

    el.onclick = (e) => {
      e.stopPropagation();
      selected = n.id;
      draw();
      showPopup(n);
    };

    nodeContainer.appendChild(el);
  });

  data.edges.forEach(e => {
    const from = getNode(e.from);
    const to = getNode(e.to);
    if (!from || !to) return;

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

    const dx = Math.abs(to.x - from.x) * 0.4;

    const d = `
      M ${from.x} ${from.y}
      C ${from.x + dx} ${from.y},
        ${to.x - dx} ${to.y},
        ${to.x} ${to.y}
    `;

    path.setAttribute("d", d);

    let type = normalizeType(from.type);
    let cls = `line line-${type}`;

    if (selected) {
      if (e.from === selected || e.to === selected) {
        cls = "line-related";
      } else {
        cls = "line-dimmed";
      }
    }

    path.setAttribute("class", cls);

    svg.appendChild(path);
  });
}

/* === POPUP === */

function showPopup(node) {
  const popup = document.getElementById("popup");

  popup.innerHTML = `
    <b>${node.label}</b><br>
    Type: ${node.type}<br>
    Status: ${node.status || ""}<br>
    ${node.description || ""}
  `;

  const x = node.x * view.scale + view.x;
  const y = node.y * view.scale + view.y;

  popup.style.left = (x + 20) + "px";
  popup.style.top = y + "px";
  popup.style.display = "block";
}

/* === INTERACTION === */

document.getElementById("graphViewport").addEventListener("wheel", (e) => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  view.scale = Math.max(0.2, Math.min(2, view.scale * factor));
  applyTransform();
}, { passive: false });

document.getElementById("graphViewport").addEventListener("mousedown", (e) => {
  let startX = e.clientX;
  let startY = e.clientY;

  function move(ev) {
    view.x += ev.clientX - startX;
    view.y += ev.clientY - startY;
    startX = ev.clientX;
    startY = ev.clientY;
    applyTransform();
  }

  function up() {
    window.removeEventListener("mousemove", move);
    window.removeEventListener("mouseup", up);
  }

  window.addEventListener("mousemove", move);
  window.addEventListener("mouseup", up);
});

/* === LOAD === */

async function load() {
  const res = await fetch(URL);
  const raw = await res.json();
  data = raw;
  draw();
}

document.body.onclick = () => {
  document.getElementById("popup").style.display = "none";
  selected = null;
  draw();
};

load();
applyTransform();
</script>

</body>
</html>
