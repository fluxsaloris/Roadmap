<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Backrooms Paradox: Level Paths</title>

  <style>
    :root {
      --bg: #070709;
      --surface: rgba(20, 20, 26, 0.92);
      --border: rgba(255, 255, 255, 0.06);
      --text: #f4f4f7;
      --muted: #a7a7b5;
      --muted-2: #7f8091;
      --accent: #be1a48;
      --shadow-lg: 0 18px 40px rgba(0, 0, 0, 0.30);
      --shadow-md: 0 10px 24px rgba(0, 0, 0, 0.18);
      --radius: 18px;
      --sidebar-width: 360px;
      --canvas-height: 78vh;
      --canvas-min-height: 620px;
      --mobile-fab-size: 52px;
      --node-width-desktop: 170px;
      --node-width-mobile: 118px;

      --type-stable-dot: #4CAF50;
      --type-dangerous-dot: #E53935;
      --type-corrupted-dot: #3E5F3A;
      --type-anomalous-dot: #8E44AD;
    }

    body.light {
      --bg: #f7f7f7;
      --surface: rgba(255, 255, 255, 0.94);
      --border: rgba(0, 0, 0, 0.10);
      --text: #111111;
      --muted: #555555;
      --muted-2: #777777;
      --shadow-lg: 0 18px 40px rgba(0, 0, 0, 0.14);
      --shadow-md: 0 10px 24px rgba(0, 0, 0, 0.10);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at top left, rgba(190, 26, 72, 0.08), transparent 28%),
        radial-gradient(circle at 90% 12%, rgba(255,255,255,0.025), transparent 18%),
        linear-gradient(180deg, #0a0a0d 0%, #070709 100%);
    }

    body.light {
      background:
        radial-gradient(circle at top left, rgba(190, 26, 72, 0.05), transparent 28%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.10;
      background-image:
        radial-gradient(1px 1px at 12% 20%, rgba(255,255,255,0.85), transparent),
        radial-gradient(1px 1px at 30% 72%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.3px 1.3px at 52% 40%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 81% 58%, rgba(255,255,255,0.7), transparent);
    }

    body.light::before {
      opacity: 0.035;
      background-image:
        radial-gradient(1px 1px at 12% 20%, rgba(0,0,0,0.7), transparent),
        radial-gradient(1px 1px at 30% 72%, rgba(0,0,0,0.6), transparent),
        radial-gradient(1.3px 1.3px at 52% 40%, rgba(0,0,0,0.65), transparent),
        radial-gradient(1px 1px at 81% 58%, rgba(0,0,0,0.6), transparent);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      margin: 8px;
      border-radius: 16px;
      border: 1px solid rgba(190, 26, 72, 0.10);
      box-shadow: 0 0 20px rgba(190, 26, 72, 0.04);
      pointer-events: none;
      z-index: 1;
    }

    #app {
      position: relative;
      z-index: 2;
      max-width: 1800px;
      margin: 0 auto;
      padding: 16px;
    }

    #viewerThemeButton {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 80;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 800;
      box-shadow: var(--shadow-md);
      cursor: pointer;
    }

    #viewerThemeButton:hover {
      border-color: var(--accent);
    }

    .hero, .panel, .sidebarCard, .mobilePanel, .mobileInspector {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .hero, .panel, .sidebarCard {
      border-radius: var(--radius);
    }

    .hero {
      position: sticky;
      top: 8px;
      z-index: 30;
      padding: 14px 16px;
      margin-bottom: 14px;
      background: rgba(13, 13, 18, 0.88);
    }

    body.light .hero {
      background: rgba(255, 255, 255, 0.92);
    }

    .heroTop {
      display: flex;
      gap: 14px;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      padding-right: 120px;
    }

    .heroTitle {
      min-width: 280px;
      flex: 1;
    }

    .eyebrow {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #d98aa0;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .heroTitle h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .heroTitle p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      max-width: 860px;
    }

        .heroMeta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .infoBadge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      border-radius: 999px;
      font-weight: 700;
      padding: 7px 11px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
    }

    body.light .infoBadge {
      background: rgba(0,0,0,0.035);
    }

    .heroControls {
      margin-top: 12px;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 10px;
      align-items: start;
    }

    #searchInput {
      width: 100%;
      background: rgba(22, 22, 30, 0.96);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 12px 13px;
      font-size: 14px;
      outline: none;
      transition: 0.18s ease;
    }

    body.light #searchInput {
      background: rgba(0, 0, 0, 0.035);
    }

    #searchInput::placeholder {
      color: var(--muted-2);
    }

    #searchInput:focus {
      border-color: rgba(190, 26, 72, 0.42);
      box-shadow: 0 0 0 4px rgba(190, 26, 72, 0.10);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      appearance: none;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.18s ease;
    }

    body.light button {
      background: rgba(0,0,0,0.035);
    }

    button:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(190, 26, 72, 0.34);
      transform: translateY(-1px);
    }

    .primaryBtn {
      background: linear-gradient(180deg, rgba(190, 26, 72, 0.9), rgba(148, 16, 53, 0.95));
      color: #fff;
    }

    .statusLine {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .workspaceRow {
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--sidebar-width);
      gap: 14px;
    }

    .leftColumn {
      display: grid;
      gap: 14px;
    }

    .rightColumn {
      display: grid;
      gap: 12px;
    }

    .panel, .sidebarCard {
      padding: 14px;
    }

    .graphViewport {
      position: relative;
      width: 100%;
      height: var(--canvas-height);
      min-height: var(--canvas-min-height);
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid var(--border);
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(180deg, #08080c, #050509);
      background-size: 48px 48px, 48px 48px, auto;
      cursor: grab;
    }

    body.light .graphViewport {
      background:
        linear-gradient(rgba(0,0,0,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.045) 1px, transparent 1px),
        linear-gradient(180deg, #ffffff, #f0f0f0);
    }

    .graphScene {
      position: absolute;
      inset: 0;
      transform-origin: 0 0;
    }

    .graphSvg {
      position: absolute;
      left: 0;
      top: 0;
      overflow: visible;
      pointer-events: none;
    }

    .graphNodes {
      position: absolute;
      inset: 0;
    }

        .line-base {
      fill: none;
      stroke-width: 2.6;
      stroke-linecap: round;
      opacity: 0.95;
    }

    .line-dimmed {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 2;
      stroke-linecap: round;
      opacity: 0.6;
    }

    body.light .line-dimmed {
      stroke: rgba(0,0,0,0.1);
    }

    .edge-stable { stroke: #4CAF50; }
    .edge-dangerous { stroke: #E53935; }
    .edge-corrupted { stroke: #3E5F3A; }
    .edge-anomalous { stroke: #8E44AD; }

    .node {
      position: absolute;
      min-width: var(--node-width-desktop);
      max-width: 260px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      transform: translate(-50%, -50%);
      transition: 0.15s ease;
      cursor: pointer;
      background: var(--surface);
    }

    body.light .node {
      background: #ffffff;
      border-color: rgba(0,0,0,0.12);
    }

    .node:hover {
      transform: translate(-50%, -50%) scale(1.02);
      border-color: var(--accent);
    }

    .node.selected {
      box-shadow: 0 0 0 3px rgba(190, 26, 72, 0.25);
    }

    .node.dimmed {
      opacity: 0.4;
    }

    .nodeHeader {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nodeDot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .node.stable .nodeDot { background: var(--type-stable-dot); }
    .node.dangerous .nodeDot { background: var(--type-dangerous-dot); }
    .node.corrupted .nodeDot { background: var(--type-corrupted-dot); }
    .node.anomalous .nodeDot { background: var(--type-anomalous-dot); }

    .nodeTitle {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
    }

    .nodeSubtitle {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
    }

    .nodeStatusRow {
      margin-top: 6px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .nodeBadge {
      font-size: 10px;
      font-weight: 700;
      padding: 4px 7px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
    }

    body.light .nodeBadge {
      background: rgba(0,0,0,0.05);
    }

    .sidebarTitle {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .infoList {
      display: grid;
      gap: 10px;
    }

    .infoLabel {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--muted-2);
      font-weight: 700;
    }

    .infoValue {
      font-size: 13px;
      color: var(--text);
    }

    .linkList {
      padding-left: 18px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<button id="viewerThemeButton">Light Mode</button>

<div id="app">

<section class="hero">
  <div class="heroTop">
    <div class="heroTitle">
      <div class="eyebrow">Backrooms Paradox: Map</div>
      <h1>Backrooms Paradox: Level Paths</h1>
      <p>Explore level paths and connections.</p>
    </div>

    <div class="heroMeta">
      <div class="infoBadge" id="statNodes">0 nodes</div>
      <div class="infoBadge" id="statEdges">0 links</div>
    </div>
  </div>

  <div class="heroControls">
    <input id="searchInput" placeholder="Search..." />
    <div class="toolbar">
      <button onclick="fitToGraph()">Fit</button>
      <button onclick="clearSelection()">Clear</button>
      <button class="primaryBtn" onclick="reloadGraph()">Refresh</button>
    </div>
  </div>

  <div class="statusLine" id="statusLine">Loading graph...</div>
</section>

<div class="workspaceRow">
  <div class="leftColumn">
    <div class="panel">
      <div class="graphViewport" id="graphViewport">
        <div class="graphScene" id="graphScene">
          <svg id="graphSvg" class="graphSvg"></svg>
          <div id="graphNodes" class="graphNodes"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="rightColumn">
    <div class="sidebarCard">
      <div class="sidebarTitle">Selected Level</div>
      <div class="infoList">
        <div><div class="infoLabel">Label</div><div id="infoLabel" class="infoValue">—</div></div>
        <div><div class="infoLabel">Type</div><div id="infoType" class="infoValue">—</div></div>
        <div><div class="infoLabel">Description</div><div id="infoDescription" class="infoValue">—</div></div>
      </div>
    </div>

    <div class="sidebarCard">
      <div class="sidebarTitle">Connections</div>
      <ul id="outgoingList" class="linkList"></ul>
    </div>
  </div>
</div>
</div>

<script>
const RAW_JSON_URL = "https://raw.githubusercontent.com/fluxsaloris/Roadmap/main/backroomsparadox/backrooms-levels.json";

let currentTheme = localStorage.getItem("backroomsTheme") || "dark";

function applyViewerTheme(theme) {
  currentTheme = theme === "light" ? "light" : "dark";
  localStorage.setItem("backroomsTheme", currentTheme);
  document.body.classList.toggle("light", currentTheme === "light");

  const btn = document.getElementById("viewerThemeButton");
  if (btn) {
    btn.textContent = currentTheme === "light" ? "Dark Mode" : "Light Mode";
  }
}

window.addEventListener("message", (event) => {
  if (event.data && event.data.type === "theme") {
    applyViewerTheme(event.data.theme);
  }
});

let graphData = { nodes: [], edges: [] };
let selectedNodeId = null;
let sceneOffset = { x: 0, y: 0 };

function normalizeType(type) {
  const value = String(type || "").trim().toLowerCase();

  if (value === "stable" || value === "start") return "stable";
  if (value === "dangerous" || value === "progression") return "dangerous";
  if (value === "corrupted" || value === "danger") return "corrupted";
  if (value === "anomalous" || value === "weird") return "anomalous";

  return "stable";
}

function slugifyLabel(label) {
  return String(label || "node")
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "") || "node";
}

function makeUniqueId(base, used) {
  let normalizedBase = String(base || "node").trim() || "node";
  let id = normalizedBase;
  let i = 2;

  while (used.has(id)) {
    id = `${normalizedBase}-${i}`;
    i++;
  }

  used.add(id);
  return id;
}

function buildNodeMapsFromRaw(rawNodes) {
  const usedIds = new Set();
  const nodes = [];
  const rawKeyToId = new Map();

  for (let i = 0; i < rawNodes.length; i++) {
    const n = rawNodes[i] || {};

    const explicitId =
      n.id !== null &&
      n.id !== undefined &&
      String(n.id).trim() !== ""
        ? String(n.id).trim()
        : null;

    const label = typeof n.label === "string" ? n.label : "Unnamed";

    const finalId = makeUniqueId(
      explicitId || slugifyLabel(label || `node-${i + 1}`),
      usedIds
    );

    const node = {
      id: finalId,
      label,
      subtitle: typeof n.subtitle === "string" ? n.subtitle : "",
      description: typeof n.description === "string" ? n.description : "",
      notes: typeof n.notes === "string" ? n.notes : "",
      x: typeof n.x === "number" ? n.x : 0,
      y: typeof n.y === "number" ? n.y : 0,
      type: normalizeType(n.type),
      status: typeof n.status === "string" ? n.status : "draft",
      tags: Array.isArray(n.tags) ? n.tags.map(tag => String(tag)) : []
    };

    nodes.push(node);

    rawKeyToId.set(finalId, finalId);
    rawKeyToId.set(label, finalId);

    if (explicitId) {
      rawKeyToId.set(explicitId, finalId);
    }
  }

  return { nodes, rawKeyToId };
}

function normalizeData(raw) {
  const rawNodes = Array.isArray(raw && raw.nodes) ? raw.nodes : [];
  const { nodes, rawKeyToId } = buildNodeMapsFromRaw(rawNodes);

  const validIds = new Set(nodes.map(n => n.id));
  const seen = new Set();

  const rawEdges = Array.isArray(raw && raw.edges) ? raw.edges : [];
  const edges = [];

  for (const e of rawEdges) {
    const rawFrom =
      e && e.from !== null &&
      e.from !== undefined &&
      String(e.from).trim() !== ""
        ? String(e.from).trim()
        : null;

    const rawTo =
      e && e.to !== null &&
      e.to !== undefined &&
      String(e.to).trim() !== ""
        ? String(e.to).trim()
        : null;

    const from = rawFrom ? rawKeyToId.get(rawFrom) || null : null;
    const to = rawTo ? rawKeyToId.get(rawTo) || null : null;

    if (!from || !to) continue;
    if (!validIds.has(from) || !validIds.has(to)) continue;
    if (from === to) continue;

    const edge = {
      from,
      to,
      label: typeof (e && e.label) === "string" ? e.label : ""
    };

    const key = `${edge.from}|${edge.to}|${edge.label}`;
    if (seen.has(key)) continue;

    seen.add(key);
    edges.push(edge);
  }

  return { nodes, edges };
}

function getNodeById(id) {
  return graphData.nodes.find(n => n.id === String(id)) || null;
}

function escapeHtml(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function getBounds() {
  if (!graphData.nodes.length) {
    return { minX: 0, maxX: 1000, minY: 0, maxY: 800 };
  }

  const xs = graphData.nodes.map(n => Number(n.x) || 0);
  const ys = graphData.nodes.map(n => Number(n.y) || 0);

  return {
    minX: Math.min(...xs),
    maxX: Math.max(...xs),
    minY: Math.min(...ys),
    maxY: Math.max(...ys)
  };
}

  function renderGraph() {
  const nodesEl = document.getElementById("graphNodes");
  const svg = document.getElementById("graphSvg");

  nodesEl.innerHTML = "";
  svg.innerHTML = "";

  const bounds = getBounds();
  const padding = 260;

  sceneOffset.x = bounds.minX - padding;
  sceneOffset.y = bounds.minY - padding;

  const width = Math.max(1200, bounds.maxX - bounds.minX + padding * 2);
  const height = Math.max(800, bounds.maxY - bounds.minY + padding * 2);

  svg.setAttribute("width", width);
  svg.setAttribute("height", height);
  svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

  const scene = document.getElementById("graphScene");
  scene.style.width = `${width}px`;
  scene.style.height = `${height}px`;

  nodesEl.style.width = `${width}px`;
  nodesEl.style.height = `${height}px`;

  renderEdges(svg);
  renderNodes(nodesEl);
}

function renderEdges(svg) {
  graphData.edges.forEach(edge => {
    const from = getNodeById(edge.from);
    const to = getNodeById(edge.to);
    if (!from || !to) return;

    const fromX = from.x - sceneOffset.x;
    const fromY = from.y - sceneOffset.y;
    const toX = to.x - sceneOffset.x;
    const toY = to.y - sceneOffset.y;

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

    const dx = Math.abs(toX - fromX);
    const curve = Math.max(40, Math.min(140, dx * 0.35));

    const d = `
      M ${fromX + 85} ${fromY}
      C ${fromX + 85 + curve} ${fromY},
        ${toX - 85 - curve} ${toY},
        ${toX - 85} ${toY}
    `;

    const edgeClass =
      selectedNodeId && edge.from !== selectedNodeId && edge.to !== selectedNodeId
        ? "line-dimmed"
        : `line-base edge-${from.type || "stable"}`;

    path.setAttribute("d", d);
    path.setAttribute("class", edgeClass);
    svg.appendChild(path);
  });
}

function renderNodes(nodesEl) {
  graphData.nodes.forEach(node => {
    const el = document.createElement("div");

    const related = selectedNodeId && isRelated(node.id);
    const dimmed = selectedNodeId && !related;

    el.className = `node ${node.type || "stable"} ${selectedNodeId === node.id ? "selected" : ""} ${related ? "related" : ""} ${dimmed ? "dimmed" : ""}`;

    el.style.left = `${node.x - sceneOffset.x}px`;
    el.style.top = `${node.y - sceneOffset.y}px`;

    el.innerHTML = `
      <div class="nodeHeader">
        <div class="nodeDot"></div>
        <div class="nodeTitle">${escapeHtml(node.label)}</div>
      </div>
      ${node.subtitle ? `<div class="nodeSubtitle">${escapeHtml(node.subtitle)}</div>` : ""}
      <div class="nodeStatusRow">
        <span class="nodeBadge">${escapeHtml(node.type)}</span>
        <span class="nodeBadge">${escapeHtml(node.status)}</span>
      </div>
    `;

    el.onclick = (event) => {
      event.stopPropagation();
      selectedNodeId = node.id;
      updateSidebar();
      renderGraph();
    };

    nodesEl.appendChild(el);
  });
}

function isRelated(id) {
  if (id === selectedNodeId) return true;

  return graphData.edges.some(edge =>
    (edge.from === selectedNodeId && edge.to === id) ||
    (edge.to === selectedNodeId && edge.from === id)
  );
}

function updateSidebar() {
  const node = getNodeById(selectedNodeId);

  document.getElementById("infoLabel").textContent = node ? node.label : "—";
  document.getElementById("infoType").textContent = node ? node.type : "—";
  document.getElementById("infoDescription").textContent = node ? node.description || "—" : "—";

  if (!node) {
    document.getElementById("outgoingList").innerHTML = "<li>No level selected.</li>";
    return;
  }

  const connected = graphData.edges
    .filter(edge => edge.from === node.id || edge.to === node.id)
    .map(edge => {
      const otherId = edge.from === node.id ? edge.to : edge.from;
      const other = getNodeById(otherId);
      return `<li>${escapeHtml(other ? other.label : otherId)}</li>`;
    });

  document.getElementById("outgoingList").innerHTML = connected.length
    ? connected.join("")
    : "<li>No connections.</li>";
}

function updateStats() {
  document.getElementById("statNodes").textContent = `${graphData.nodes.length} nodes`;
  document.getElementById("statEdges").textContent = `${graphData.edges.length} links`;
}

function fitToGraph() {
  const viewport = document.getElementById("graphViewport");
  const scene = document.getElementById("graphScene");

  const rect = viewport.getBoundingClientRect();
  const bounds = getBounds();

  const graphWidth = Math.max(600, bounds.maxX - bounds.minX + 520);
  const graphHeight = Math.max(400, bounds.maxY - bounds.minY + 520);

  const scale = Math.min(
    1.15,
    Math.max(0.35, Math.min(rect.width / graphWidth, rect.height / graphHeight))
  );

  const centerX = (bounds.minX + bounds.maxX) / 2 - sceneOffset.x;
  const centerY = (bounds.minY + bounds.maxY) / 2 - sceneOffset.y;

  const x = rect.width / 2 - centerX * scale;
  const y = rect.height / 2 - centerY * scale;

  scene.style.transformOrigin = "0 0";
  scene.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
}

async function loadGraph() {
  const status = document.getElementById("statusLine");

  try {
    status.textContent = "Loading graph...";

    const response = await fetch(RAW_JSON_URL + "?v=" + Date.now(), {
      cache: "no-store"
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const raw = await response.json();
    graphData = normalizeData(raw);

    if (!graphData.nodes.length) {
      throw new Error("No nodes found.");
    }

    selectedNodeId = null;

    renderGraph();
    updateStats();
    updateSidebar();

    setTimeout(fitToGraph, 100);

    status.textContent = `Loaded ${graphData.nodes.length} nodes and ${graphData.edges.length} links.`;
  } catch (err) {
    console.error(err);
    status.textContent = "Failed to load graph.";
  }
}

function reloadGraph() {
  loadGraph();
}

function clearSelection() {
  selectedNodeId = null;
  updateSidebar();
  renderGraph();
}

function init() {
  applyViewerTheme(currentTheme);

  const btn = document.getElementById("viewerThemeButton");
  if (btn) {
    btn.onclick = () => {
      applyViewerTheme(currentTheme === "dark" ? "light" : "dark");
    };
  }

  const viewport = document.getElementById("graphViewport");
  if (viewport) {
    viewport.addEventListener("click", () => {
      clearSelection();
    });
  }

  loadGraph();
}

window.fitToGraph = fitToGraph;
window.clearSelection = clearSelection;
window.reloadGraph = reloadGraph;

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
