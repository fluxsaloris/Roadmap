<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Backrooms Paradox: Level Paths</title>

  <style>
    :root {
      --bg: #070709;
      --surface: rgba(20, 20, 26, 0.92);
      --border: rgba(255, 255, 255, 0.06);
      --text: #f4f4f7;
      --muted: #a7a7b5;
      --muted-2: #7f8091;
      --accent: #be1a48;
      --shadow-lg: 0 18px 40px rgba(0, 0, 0, 0.30);
      --shadow-md: 0 10px 24px rgba(0, 0, 0, 0.18);
      --radius: 18px;
      --sidebar-width: 360px;
      --canvas-height: 78vh;
      --canvas-min-height: 620px;
      --mobile-fab-size: 52px;
      --node-width-desktop: 170px;
      --node-width-mobile: 118px;

      --type-stable-dot: #4CAF50;
      --type-dangerous-dot: #E53935;
      --type-corrupted-dot: #3E5F3A;
      --type-anomalous-dot: #8E44AD;
    }

    body.light {
      --bg: #f7f7f7;
      --surface: rgba(255, 255, 255, 0.94);
      --border: rgba(0, 0, 0, 0.10);
      --text: #111111;
      --muted: #555555;
      --muted-2: #777777;
      --shadow-lg: 0 18px 40px rgba(0, 0, 0, 0.14);
      --shadow-md: 0 10px 24px rgba(0, 0, 0, 0.10);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    *::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at top left, rgba(190, 26, 72, 0.08), transparent 28%),
        radial-gradient(circle at 90% 12%, rgba(255,255,255,0.025), transparent 18%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg) 100%);
    }

    body.light {
      background:
        radial-gradient(circle at top left, rgba(190, 26, 72, 0.05), transparent 28%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.10;
      background-image:
        radial-gradient(1px 1px at 12% 20%, rgba(255,255,255,0.85), transparent),
        radial-gradient(1px 1px at 30% 72%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.3px 1.3px at 52% 40%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 81% 58%, rgba(255,255,255,0.7), transparent);
    }

    body.light::before {
      opacity: 0.035;
      background-image:
        radial-gradient(1px 1px at 12% 20%, rgba(0,0,0,0.85), transparent),
        radial-gradient(1px 1px at 30% 72%, rgba(0,0,0,0.7), transparent),
        radial-gradient(1.3px 1.3px at 52% 40%, rgba(0,0,0,0.8), transparent),
        radial-gradient(1px 1px at 81% 58%, rgba(0,0,0,0.7), transparent);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      margin: 8px;
      border-radius: 16px;
      border: 1px solid rgba(190, 26, 72, 0.10);
      box-shadow: 0 0 20px rgba(190, 26, 72, 0.04);
      pointer-events: none;
      z-index: 1;
    }

    #app {
      position: relative;
      z-index: 2;
      max-width: 1800px;
      margin: 0 auto;
      padding: 16px;
    }

    #viewerThemeButton {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 80;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 800;
      box-shadow: var(--shadow-md);
    }

    #viewerThemeButton:hover {
      border-color: var(--accent);
    }

    .hero, .panel, .sidebarCard, .mobilePanel, .mobileInspector {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .hero, .panel, .sidebarCard {
      border-radius: var(--radius);
    }

    .hero {
      position: sticky;
      top: 8px;
      z-index: 30;
      padding: 14px 16px;
      margin-bottom: 14px;
    }

    .heroTop {
      display: flex;
      gap: 14px;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      padding-right: 120px;
    }

    .heroTitle {
      min-width: 280px;
      flex: 1;
    }

    .eyebrow {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #d98aa0;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .heroTitle h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .heroTitle p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      max-width: 860px;
    }

    .heroMeta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .infoBadge, .metaChip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      border-radius: 999px;
      font-weight: 700;
    }

    .infoBadge {
      padding: 7px 11px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
    }

    body.light .infoBadge {
      background: rgba(0,0,0,0.035);
    }

    .heroControls {
      margin-top: 12px;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 10px;
      align-items: start;
    }

    #searchInput, #mobileSearchInput {
      width: 100%;
      background: rgba(22, 22, 30, 0.96);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 12px 13px;
      font-size: 14px;
      outline: none;
      transition: 0.18s ease;
      font-family: inherit;
    }

    body.light #searchInput,
    body.light #mobileSearchInput {
      background: rgba(0, 0, 0, 0.035);
      color: var(--text);
    }

    #searchInput::placeholder,
    #mobileSearchInput::placeholder {
      color: var(--muted-2);
    }

    #searchInput:focus, #mobileSearchInput:focus {
      border-color: rgba(190, 26, 72, 0.42);
      box-shadow: 0 0 0 4px rgba(190, 26, 72, 0.10);
      background: rgba(26, 26, 34, 0.98);
    }

    body.light #searchInput:focus,
    body.light #mobileSearchInput:focus {
      background: rgba(255,255,255,0.98);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

        .mobileControlsGrid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    button {
      appearance: none;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.18s ease;
      box-shadow: none;
      font-family: inherit;
    }

    body.light button {
      background: rgba(0,0,0,0.035);
    }

    button:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(190, 26, 72, 0.34);
      transform: translateY(-1px);
    }

    body.light button:hover {
      background: rgba(0,0,0,0.06);
    }

    button:active {
      transform: scale(0.98);
    }

    .primaryBtn {
      background: linear-gradient(180deg, rgba(190, 26, 72, 0.9), rgba(148, 16, 53, 0.95));
      border-color: rgba(255,255,255,0.05);
      color: #fff;
      box-shadow: 0 8px 18px rgba(190, 26, 72, 0.22);
    }

    .primaryBtn:hover {
      background: linear-gradient(180deg, rgba(206, 33, 82, 0.98), rgba(162, 19, 59, 0.98));
    }

    .statusLine {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .workspaceRow {
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--sidebar-width);
      gap: 14px;
      align-items: start;
    }

    .leftColumn {
      min-width: 0;
      display: grid;
      gap: 14px;
    }

    .rightColumn {
      min-width: 0;
      display: grid;
      gap: 12px;
      position: sticky;
      top: 132px;
      align-self: start;
      max-height: calc(100vh - 150px);
      overflow-y: auto;
      padding-right: 2px;
    }

    .panel, .sidebarCard {
      padding: 14px;
    }

    .canvasPanel {
      padding: 10px;
    }

    .canvasToolbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .canvasHint {
      color: var(--muted);
      font-size: 12px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      border-radius: 999px;
    }

    body.light .canvasHint {
      background: rgba(0,0,0,0.035);
    }

    .graphViewport {
      position: relative;
      width: 100%;
      height: var(--canvas-height);
      min-height: var(--canvas-min-height);
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid var(--border);
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        radial-gradient(circle at top left, rgba(190, 26, 72, 0.07), transparent 32%),
        linear-gradient(180deg, rgba(8,8,12,0.98), rgba(5,5,9,0.99));
      background-size: 48px 48px, 48px 48px, auto, auto;
      user-select: none;
      cursor: grab;
      touch-action: none;
    }

    body.light .graphViewport {
      background:
        linear-gradient(rgba(0,0,0,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.045) 1px, transparent 1px),
        radial-gradient(circle at top left, rgba(190, 26, 72, 0.05), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(245,245,245,0.99));
    }

    .graphViewport.panning {
      cursor: grabbing;
    }

    .graphScene {
      position: absolute;
      inset: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    .graphSvg {
      position: absolute;
      left: 0;
      top: 0;
      overflow: visible;
      pointer-events: none;
    }

    .graphNodes {
      position: absolute;
      inset: 0;
      overflow: visible;
      pointer-events: none;
    }

    .line-base {
      fill: none;
      stroke-width: 2.8;
      stroke-linecap: round;
      opacity: 0.95;
    }

    .line-selected {
      fill: none;
      stroke-width: 3.8;
      stroke-linecap: round;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.18));
      opacity: 1;
    }

    body.light .line-selected {
      filter: drop-shadow(0 0 8px rgba(0,0,0,0.12));
    }

    .line-dimmed {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 2;
      stroke-linecap: round;
      opacity: 0.7;
    }

    body.light .line-dimmed {
      stroke: rgba(0,0,0,0.10);
    }

    .edge-stable { stroke: #4CAF50; }
    .edge-dangerous { stroke: #E53935; }
    .edge-corrupted { stroke: #3E5F3A; }
    .edge-anomalous { stroke: #8E44AD; }

    .edgeLabel {
      fill: rgba(220,220,230,0.92);
      font-size: 12px;
      font-weight: 600;
      paint-order: stroke;
      stroke: rgba(0,0,0,0.65);
      stroke-width: 4px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    body.light .edgeLabel {
      fill: #222;
      stroke: rgba(255,255,255,0.88);
    }

    .node {
      position: absolute;
      min-width: var(--node-width-desktop);
      max-width: 260px;
      padding: 12px 12px 10px;
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      transform: translate(-50%, -50%);
      transition: box-shadow .14s ease, border-color .14s ease, transform .14s ease, opacity .14s ease;
      backdrop-filter: blur(5px);
      cursor: pointer;
      pointer-events: auto;
      background: var(--surface);
    }

    body.light .node {
      background: #ffffff;
      border-color: rgba(0,0,0,0.12);
    }

    .node:hover {
      transform: translate(-50%, -50%) scale(1.02);
      border-color: var(--accent);
    }

    .node.selected {
      z-index: 30;
      box-shadow: 0 0 0 3px rgba(190, 26, 72, 0.25), var(--shadow-md);
    }

    .node.related {
      box-shadow: 0 0 0 2px rgba(255,255,255,0.05), var(--shadow-md);
    }

    body.light .node.related {
      box-shadow: 0 0 0 2px rgba(0,0,0,0.05), var(--shadow-md);
    }

    .node.dimmed {
      opacity: 0.42;
    }

        .nodeHeader {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nodeDot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .node.stable .nodeDot { background: var(--type-stable-dot); }
    .node.dangerous .nodeDot { background: var(--type-dangerous-dot); }
    .node.corrupted .nodeDot { background: var(--type-corrupted-dot); }
    .node.anomalous .nodeDot { background: var(--type-anomalous-dot); }

    .nodeTitle {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1.2;
      word-break: break-word;
    }

    .nodeSubtitle {
      margin-top: 4px;
      font-size: 11px;
      line-height: 1.35;
      color: var(--muted);
    }

    .nodeStatusRow {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .nodeBadge {
      font-size: 10px;
      font-weight: 700;
      padding: 4px 7px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
    }

    body.light .nodeBadge {
      background: rgba(0,0,0,0.05);
    }

    .sidebarTitle {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .sidebarSub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-bottom: 10px;
    }

    .infoList {
      display: grid;
      gap: 10px;
    }

    .infoBlock {
      display: grid;
      gap: 5px;
    }

    .infoLabel {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted-2);
      font-weight: 700;
    }

    .infoValue {
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .linkList, .legendList {
      margin: 0;
      padding-left: 18px;
      color: var(--text);
      font-size: 12.5px;
      line-height: 1.5;
    }

    .linkList li + li, .legendList li + li {
      margin-top: 4px;
    }

    /* Mobile */

    .mobileFabStack {
      position: fixed;
      right: 10px;
      bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 50;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .mobileFab {
      width: var(--mobile-fab-size);
      height: var(--mobile-fab-size);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      box-shadow: var(--shadow-lg);
      background: var(--surface);
    }

    @media (max-width: 700px) {
      body::after { display: none; }

      html, body {
        height: 100%;
        overflow: hidden;
      }

      #app {
        padding: 0;
        height: 100vh;
      }

      .hero, .rightColumn {
        display: none !important;
      }

      .graphViewport {
        position: fixed;
        inset: 0;
        border-radius: 0;
        border: none;
      }

      .node {
        min-width: var(--node-width-mobile);
        max-width: 155px;
        padding: 8px;
      }

      .nodeTitle {
        font-size: 11px;
      }

      .nodeSubtitle {
        font-size: 9px;
      }

      .mobileFabStack {
        display: flex;
      }
    }
  </style>
</head>

<body>

<button id="viewerThemeButton">Light Mode</button>

<div id="loadingOverlay">
  <div id="loadingCard">
    <div class="spinner"></div>
    <div id="loadingText">Loading graph...</div>
  </div>
</div>

<div id="errorPanel">
  <div id="errorPanelTitle">Couldn’t load viewer</div>
  <div id="errorPanelText">Try refreshing or check your connection.</div>
</div>

<div id="app">

    <section class="hero">
    <div class="heroTop">
      <div class="heroTitle">
        <div class="eyebrow">Backrooms Paradox: Map</div>
        <h1>Backrooms Paradox: Level Paths</h1>
        <p>Explore level paths and connections.</p>
      </div>

      <div class="heroMeta">
        <div class="infoBadge" id="statNodes">0 nodes</div>
        <div class="infoBadge" id="statEdges">0 links</div>
      </div>
    </div>

    <div class="heroControls">
      <input id="searchInput" type="text" placeholder="Search..." />
      <div class="toolbar">
        <button onclick="fitToGraph()">Fit</button>
        <button onclick="clearSelection()">Clear</button>
        <button class="primaryBtn" onclick="reloadGraph()">Refresh</button>
      </div>
    </div>

    <div class="statusLine" id="statusLine">Loading graph...</div>
  </section>

  <div class="workspaceRow">
    <div class="leftColumn">
      <section class="panel canvasPanel">
        <div class="graphViewport" id="graphViewport">
          <div class="graphScene" id="graphScene">
            <svg id="graphSvg" class="graphSvg"></svg>
            <div id="graphNodes" class="graphNodes"></div>
          </div>
        </div>
      </section>
    </div>

    <div class="rightColumn">
      <section class="sidebarCard">
        <h2 class="sidebarTitle">Selected Level</h2>

        <div class="infoList">
          <div class="infoBlock"><div class="infoLabel">Label</div><div id="infoLabel" class="infoValue">—</div></div>
          <div class="infoBlock"><div class="infoLabel">Type</div><div id="infoType" class="infoValue">—</div></div>
          <div class="infoBlock"><div class="infoLabel">Description</div><div id="infoDescription" class="infoValue">—</div></div>
        </div>
      </section>

      <section class="sidebarCard">
        <h2 class="sidebarTitle">Connections</h2>
        <ul id="outgoingList" class="linkList"></ul>
      </section>
    </div>
  </div>
</div>

<script>
const RAW_JSON_URL = "https://raw.githubusercontent.com/fluxsaloris/Roadmap/main/backroomsparadox/backrooms-levels.json";

/* ================= THEME ================= */

let currentTheme = localStorage.getItem("backroomsTheme") || "dark";

function applyViewerTheme(theme) {
  currentTheme = theme;
  localStorage.setItem("backroomsTheme", theme);
  document.body.classList.toggle("light", theme === "light");

  const btn = document.getElementById("viewerThemeButton");
  if (btn) {
    btn.textContent = theme === "light" ? "Dark Mode" : "Light Mode";
  }
}

window.addEventListener("message", (event) => {
  if (event.data?.type === "theme") {
    applyViewerTheme(event.data.theme);
  }
});

/* ================= GRAPH CORE ================= */

let graphData = { nodes: [], edges: [] };
let selectedNodeId = null;

/* ================= LOAD GRAPH ================= */

async function loadGraph() {
  try {
    const res = await fetch(RAW_JSON_URL + "?v=" + Date.now());
    const raw = await res.json();

    graphData = normalizeData(raw); // 🔥 IMPORTANT

    renderGraph();
    updateStats();

    document.getElementById("statusLine").textContent = "Loaded.";
  } catch (e) {
    console.error(e);
    document.getElementById("statusLine").textContent = "Failed to load.";
  }
}

  function normalizeData(raw) {
  const nodes = Array.isArray(raw?.nodes)
    ? raw.nodes.map((n, index) => ({
        id: String(n.id ?? n.label ?? `node-${index}`),
        label: String(n.label ?? n.id ?? `Node ${index + 1}`),
        subtitle: String(n.subtitle ?? ""),
        description: String(n.description ?? ""),
        type: String(n.type ?? "stable").toLowerCase(),
        status: String(n.status ?? "draft"),
        x: Number(n.x ?? index * 220),
        y: Number(n.y ?? 220),
        tags: Array.isArray(n.tags) ? n.tags : []
      }))
    : [];

  const validIds = new Set(nodes.map(n => n.id));

  const edges = Array.isArray(raw?.edges)
    ? raw.edges
        .map(e => ({
          from: String(e.from ?? ""),
          to: String(e.to ?? ""),
          label: String(e.label ?? "")
        }))
        .filter(e => validIds.has(e.from) && validIds.has(e.to) && e.from !== e.to)
    : [];

  return { nodes, edges };
}

function getNodeById(id) {
  return graphData.nodes.find(n => n.id === String(id)) || null;
}

function updateStats() {
  document.getElementById("statNodes").textContent = `${graphData.nodes.length} nodes`;
  document.getElementById("statEdges").textContent = `${graphData.edges.length} links`;
}

function renderGraph() {
  const nodesEl = document.getElementById("graphNodes");
  const svg = document.getElementById("graphSvg");

  nodesEl.innerHTML = "";
  svg.innerHTML = "";

  const bounds = getBounds();
  const padding = 260;

  const minX = bounds.minX - padding;
  const minY = bounds.minY - padding;
  const width = bounds.maxX - bounds.minX + padding * 2;
  const height = bounds.maxY - bounds.minY + padding * 2;

  svg.setAttribute("width", width);
  svg.setAttribute("height", height);
  svg.setAttribute("viewBox", `${minX} ${minY} ${width} ${height}`);

  document.getElementById("graphScene").style.width = `${width}px`;
  document.getElementById("graphScene").style.height = `${height}px`;

  renderEdges(svg);
  renderNodes(nodesEl);
}

function getBounds() {
  if (!graphData.nodes.length) {
    return { minX: 0, maxX: 1000, minY: 0, maxY: 800 };
  }

  const xs = graphData.nodes.map(n => Number(n.x) || 0);
  const ys = graphData.nodes.map(n => Number(n.y) || 0);

  return {
    minX: Math.min(...xs),
    maxX: Math.max(...xs),
    minY: Math.min(...ys),
    maxY: Math.max(...ys)
  };
}

function renderEdges(svg) {
  graphData.edges.forEach(edge => {
    const from = getNodeById(edge.from);
    const to = getNodeById(edge.to);

    if (!from || !to) return;

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

    const dx = Math.abs(to.x - from.x);
    const curve = Math.max(40, Math.min(140, dx * 0.35));

    const d = `
      M ${from.x + 85} ${from.y}
      C ${from.x + 85 + curve} ${from.y},
        ${to.x - 85 - curve} ${to.y},
        ${to.x - 85} ${to.y}
    `;

    path.setAttribute("d", d);
    path.setAttribute("class", `line-base edge-${from.type || "stable"}`);

    if (selectedNodeId && edge.from !== selectedNodeId && edge.to !== selectedNodeId) {
      path.setAttribute("class", "line-dimmed");
    }

    svg.appendChild(path);

    if (edge.label) {
      const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
      text.setAttribute("x", (from.x + to.x) / 2);
      text.setAttribute("y", (from.y + to.y) / 2 - 10);
      text.setAttribute("text-anchor", "middle");
      text.setAttribute("class", "edgeLabel");
      text.textContent = edge.label;
      svg.appendChild(text);
    }
  });
}

function renderNodes(nodesEl) {
  graphData.nodes.forEach(node => {
    const el = document.createElement("div");

    const related = selectedNodeId && isRelated(node.id);
    const dimmed = selectedNodeId && !related;

    el.className = `node ${node.type || "stable"} ${selectedNodeId === node.id ? "selected" : ""} ${related ? "related" : ""} ${dimmed ? "dimmed" : ""}`;
    el.style.left = `${node.x}px`;
    el.style.top = `${node.y}px`;

    el.innerHTML = `
      <div class="nodeHeader">
        <div class="nodeDot"></div>
        <div class="nodeTitle">${escapeHtml(node.label)}</div>
      </div>
      ${node.subtitle ? `<div class="nodeSubtitle">${escapeHtml(node.subtitle)}</div>` : ""}
      <div class="nodeStatusRow">
        <span class="nodeBadge">${escapeHtml(node.type)}</span>
        <span class="nodeBadge">${escapeHtml(node.status)}</span>
      </div>
    `;

    el.onclick = (event) => {
      event.stopPropagation();
      selectedNodeId = node.id;
      updateSidebar();
      renderGraph();
    };

    nodesEl.appendChild(el);
  });
}

function isRelated(id) {
  if (id === selectedNodeId) return true;

  return graphData.edges.some(edge =>
    (edge.from === selectedNodeId && edge.to === id) ||
    (edge.to === selectedNodeId && edge.from === id)
  );
}

function updateSidebar() {
  const node = getNodeById(selectedNodeId);

  document.getElementById("infoLabel").textContent = node?.label || "—";
  document.getElementById("infoType").textContent = node?.type || "—";
  document.getElementById("infoDescription").textContent = node?.description || "—";

  const outgoing = graphData.edges.filter(e => e.from === selectedNodeId);
  const incoming = graphData.edges.filter(e => e.to === selectedNodeId);

  const items = [...outgoing, ...incoming].map(edge => {
    const otherId = edge.from === selectedNodeId ? edge.to : edge.from;
    const other = getNodeById(otherId);
    return `<li>${escapeHtml(other?.label || otherId)}</li>`;
  });

  document.getElementById("outgoingList").innerHTML = items.length
    ? items.join("")
    : "<li>No connections selected.</li>";
}

function clearSelection() {
  selectedNodeId = null;
  updateSidebar();
  renderGraph();
}

function fitToGraph() {
  const viewport = document.getElementById("graphViewport");
  const scene = document.getElementById("graphScene");

  const bounds = getBounds();
  const rect = viewport.getBoundingClientRect();

  const graphWidth = Math.max(600, bounds.maxX - bounds.minX + 400);
  const graphHeight = Math.max(400, bounds.maxY - bounds.minY + 300);

  const scale = Math.min(
    1.15,
    Math.max(0.35, Math.min(rect.width / graphWidth, rect.height / graphHeight))
  );

  const x = rect.width / 2 - ((bounds.minX + bounds.maxX) / 2) * scale;
  const y = rect.height / 2 - ((bounds.minY + bounds.maxY) / 2) * scale;

  scene.style.transformOrigin = "0 0";
  scene.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
}

function reloadGraph() {
  selectedNodeId = null;
  loadGraph();
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function init() {
  applyViewerTheme(currentTheme);

  const btn = document.getElementById("viewerThemeButton");
  if (btn) {
    btn.onclick = () => {
      applyViewerTheme(currentTheme === "dark" ? "light" : "dark");
    };
  }

  const viewport = document.getElementById("graphViewport");
  viewport.addEventListener("click", () => {
    clearSelection();
  });

  loadGraph().then(() => {
    setTimeout(fitToGraph, 100);
  });
}

window.fitToGraph = fitToGraph;
window.clearSelection = clearSelection;
window.reloadGraph = reloadGraph;

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
