<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dungeon Call Roadmap Editor</title>
  <style>
    :root {
      --bg: #000;
      --panel: rgba(18, 18, 18, 0.92);
      --border: #2a2a2a;
      --text: #f2f2f2;
      --muted: #a5a5a5;
      --accent: #BE1A48;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #000;
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
      background: radial-gradient(circle at 30% 20%, #111, #000 70%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.85), transparent),
        radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 50% 40%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.7), transparent);
      opacity: 0.28;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      border: 2px solid var(--accent);
      border-radius: 14px;
      pointer-events: none;
      box-shadow: 0 0 25px rgba(190, 26, 72, 0.25);
      margin: 6px;
      z-index: 1;
    }

    #app {
      position: relative;
      z-index: 2;
      max-width: 1650px;
      margin: 0 auto;
      padding: 22px 18px 40px;
    }

    .hero {
      background: rgba(15, 15, 15, 0.9);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px rgba(0,0,0,0.35);
      margin-bottom: 18px;
    }

    .heroTop {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .heroTitle {
      min-width: 320px;
      flex: 1;
    }

    .heroTitle h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.1;
    }

    .heroTitle p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      max-width: 840px;
    }

    .statusBadge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .status-pending {
      background: #151515;
      border-color: #353535;
      color: #9a9a9a;
    }

    .status-progress {
      background: rgba(190, 26, 72, 0.16);
      border-color: rgba(190, 26, 72, 0.55);
      color: #ffb3c9;
    }

    .status-complete {
      background: rgba(57, 255, 20, 0.16);
      border-color: rgba(57, 255, 20, 0.72);
      color: #b8ffab;
    }

    .heroControls {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1.2fr auto;
      gap: 12px;
    }

    #searchInput {
      width: 100%;
      background: #111;
      color: #e5e5e5;
      border: 1px solid #303030;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }

    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(190, 26, 72, 0.2);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      background: #111;
      color: #ddd;
      border: 1px solid #2b2b2b;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #171717;
    }

    .dangerBtn {
      border-color: rgba(190, 26, 72, 0.45);
      color: #ffb3c9;
    }

    .subtleBtn {
      color: #cfcfcf;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    .statCard {
      background: rgba(20,20,20,0.9);
      border: 1px solid #2c2c2c;
      border-radius: 12px;
      padding: 12px 14px;
      min-width: 110px;
    }

    .statValue {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .statLabel {
      margin-top: 4px;
      font-size: 11px;
      color: #9d9d9d;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    #statusLine {
      margin-top: 12px;
      font-size: 12px;
      color: #999;
    }

    .rootCard {
      background: linear-gradient(180deg, rgba(30,30,30,0.96), rgba(18,18,18,0.96));
      border: 1px solid #313131;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 0 20px rgba(0,0,0,0.35);
    }

    .rootHeader {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .rootTitle {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
    }

    #panels {
      display: grid;
      grid-template-columns: repeat(2, minmax(320px, 1fr));
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      min-height: 240px;
      height: fit-content;
      align-self: start;
    }

    .panel.status-panel-pending {
      border-color: #2a2a2a;
    }

    .panel.status-panel-progress {
      border-color: rgba(190, 26, 72, 0.35);
      box-shadow: 0 0 18px rgba(190, 26, 72, 0.08);
    }

    .panel.status-panel-complete {
      border-color: rgba(57, 255, 20, 0.42);
      box-shadow: 0 0 18px rgba(57, 255, 20, 0.12);
    }

    .panel.hiddenBySearch {
      display: none;
    }

    .panelHeader {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 12px;
    }

    .panelHeaderText h2 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.2;
    }

    .panelDescription {
      margin: 0;
      color: #bdbdbd;
      line-height: 1.5;
      font-size: 14px;
    }

    .panelBody {
      margin-top: 14px;
    }

    .panelTopMeta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .progressWrap {
      margin: 12px 0 14px;
    }

    .progressText {
      font-size: 12px;
      color: #bdbdbd;
      margin-bottom: 6px;
    }

    .progressTrack {
      width: 100%;
      height: 10px;
      background: #101010;
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      overflow: hidden;
    }

    .progressFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #BE1A48, #ff4f86);
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .panel.status-panel-complete .progressFill,
    .treeNode.completeNode .progressFill {
      background: linear-gradient(90deg, #39ff14, #8dff77);
    }

    .treeNode {
      background: rgba(22,22,22,0.96);
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
    }

    .treeNode.completeNode {
      border-color: rgba(57, 255, 20, 0.34);
      box-shadow: 0 0 12px rgba(57, 255, 20, 0.08);
    }

    .treeNode.matched {
      border-color: rgba(190, 26, 72, 0.62);
      box-shadow: 0 0 0 1px rgba(190, 26, 72, 0.24);
    }

    .treeNodeHeader {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .treeNodeTitle {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
    }

    .childrenWrap {
      margin-top: 10px;
      padding-left: 14px;
      border-left: 1px solid #2a2a2a;
    }

    .nodeActions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .editorGrid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .editorGrid input,
    .editorGrid textarea,
    .editorGrid select {
      width: 100%;
      background: #111;
      color: #e5e5e5;
      border: 1px solid #303030;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }

    .editorGrid textarea {
      min-height: 90px;
      resize: vertical;
    }

    .editorGrid input:focus,
    .editorGrid textarea:focus,
    .editorGrid select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(190, 26, 72, 0.2);
    }

    .metaChip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #333;
      background: #141414;
      color: #b6b6b6;
    }

    .emptyState {
      color: #888;
      font-size: 13px;
      padding-top: 10px;
    }

    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.84);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #loadingCard {
      background: rgba(20,20,20,0.96);
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 24px 28px;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 20px rgba(0,0,0,0.45);
      min-width: 240px;
    }

    #loadingText {
      font-size: 14px;
      color: #ddd;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid #333;
      border-top: 3px solid #BE1A48;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 14px;
    }

    #errorPanel {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 40;
      width: min(360px, calc(100vw - 40px));
      background: rgba(35, 12, 18, 0.96);
      border: 1px solid rgba(190, 26, 72, 0.5);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 0 20px rgba(190, 26, 72, 0.18);
      backdrop-filter: blur(10px);
      display: none;
    }

    #errorPanel.show {
      display: block;
    }

    #errorPanelTitle {
      font-size: 14px;
      font-weight: 700;
      color: #ffb3c9;
      margin-bottom: 6px;
    }

    #errorPanelText {
      font-size: 13px;
      line-height: 1.45;
      color: #f2d7df;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 1100px) {
      #panels {
        grid-template-columns: 1fr;
      }

      .heroControls {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div id="loadingOverlay">
    <div id="loadingCard">
      <div class="spinner"></div>
      <div id="loadingText">Loading roadmap...</div>
    </div>
  </div>

  <div id="errorPanel">
    <div id="errorPanelTitle">Couldn’t load roadmap</div>
    <div id="errorPanelText">Try refreshing or check your connection.</div>
  </div>

  <div id="app">
    <section class="hero">
      <div class="heroTop">
        <div class="heroTitle">
          <h1>Dungeon Call Editor</h1>
          <p>Panel-based roadmap editor with per-category completion, nested progress bars, and simple top-level reordering.</p>
        </div>
        <div id="rootStatusBadge" class="statusBadge status-progress">In Progress</div>
      </div>

      <div class="heroControls">
        <input id="searchInput" type="text" placeholder="Search roadmap panels and items..." autocomplete="off" />
        <div class="toolbar">
          <button onclick="expandAllSections()">Expand All</button>
          <button onclick="collapseAllSections()">Collapse All</button>
          <button onclick="saveRoadmap()">Save to GitHub</button>
          <button onclick="reloadRoadmap()">Reload</button>
        </div>
      </div>

      <div class="stats">
        <div class="statCard">
          <div class="statValue" id="statTotal">0</div>
          <div class="statLabel">Total</div>
        </div>
        <div class="statCard">
          <div class="statValue" id="statComplete">0</div>
          <div class="statLabel">Done</div>
        </div>
        <div class="statCard">
          <div class="statValue" id="statProgress">0</div>
          <div class="statLabel">Progress</div>
        </div>
        <div class="statCard">
          <div class="statValue" id="statPending">0</div>
          <div class="statLabel">Pending</div>
        </div>
      </div>

      <div id="statusLine">Loading roadmap...</div>
    </section>

    <section id="rootPanel" class="rootCard"></section>
    <section id="panels"></section>
  </div>

  <script>
    const SAVE_URL = "https://roadmap.flux-saloris.workers.dev";
    const RAW_JSON_URL = "https://raw.githubusercontent.com/fluxsaloris/Roadmap/main/roadmap.json";

    let graphData = { nodes: [], edges: [] };
    let childMap = new Map();
    let nodeMap = new Map();
    let parentMap = new Map();
    let rootId = null;
    let expandedNodes = new Set();
    let currentSearch = "";
    let hasUnsavedChanges = false;

    function showLoading(text = "Loading roadmap...") {
      document.getElementById("loadingText").textContent = text;
      document.getElementById("loadingOverlay").style.display = "flex";
    }

    function hideLoading() {
      document.getElementById("loadingOverlay").style.display = "none";
    }

    function setStatus(text, isError = false) {
      const el = document.getElementById("statusLine");
      el.textContent = text;
      el.style.color = isError ? "#ff8a8a" : "#999";
    }

    function showErrorPanel(message) {
      document.getElementById("errorPanelText").textContent = message;
      document.getElementById("errorPanel").classList.add("show");
    }

    function hideErrorPanel() {
      document.getElementById("errorPanel").classList.remove("show");
    }

    function markDirty() {
      hasUnsavedChanges = true;
      setStatus("You have unsaved changes.");
    }

    function clearDirty() {
      hasUnsavedChanges = false;
      setStatus("Loaded latest roadmap.");
    }

    function normalizeGraphData(raw) {
      const rawNodes = Array.isArray(raw?.nodes) ? raw.nodes : [];
      const rawEdges = Array.isArray(raw?.edges) ? raw.edges : [];

      return {
        nodes: rawNodes.map(n => ({
          id: Number(n.id),
          label: n.label || "Unnamed",
          status: n.status || "pending",
          description: n.description || "Coming Soon",
          x: typeof n.x === "number" ? n.x : null,
          y: typeof n.y === "number" ? n.y : null
        })),
        edges: rawEdges.map((e, index) => ({
          id: `${e.from}->${e.to}-${index}`,
          from: Number(e.from),
          to: Number(e.to)
        }))
      };
    }

    function rebuildMaps() {
      childMap = new Map();
      nodeMap = new Map();
      parentMap = new Map();

      for (const node of graphData.nodes) {
        nodeMap.set(Number(node.id), node);
        childMap.set(Number(node.id), []);
      }

      for (const edge of graphData.edges) {
        const from = Number(edge.from);
        const to = Number(edge.to);
        if (!childMap.has(from)) childMap.set(from, []);
        childMap.get(from).push(to);
        parentMap.set(to, from);
      }

      for (const [id, kids] of childMap.entries()) {
        kids.sort((a, b) => {
          const na = nodeMap.get(a);
          const nb = nodeMap.get(b);
          const ax = typeof na?.x === "number" ? na.x : 0;
          const bx = typeof nb?.x === "number" ? nb.x : 0;
          if (ax !== bx) return ax - bx;
          const ay = typeof na?.y === "number" ? na.y : 0;
          const by = typeof nb?.y === "number" ? nb.y : 0;
          if (ay !== by) return ay - by;
          return (na?.label || "").localeCompare(nb?.label || "");
        });
      }
    }

    function getRootId() {
      const childIds = new Set(graphData.edges.map(e => Number(e.to)));
      const root = graphData.nodes.find(n => !childIds.has(Number(n.id)));
      return root ? Number(root.id) : (graphData.nodes[0] ? Number(graphData.nodes[0].id) : null);
    }

    function getNodeById(id) {
      return nodeMap.get(Number(id)) || null;
    }

    function getChildren(id) {
      return childMap.get(Number(id)) || [];
    }

    function getStatusLabel(status) {
      if (status === "complete") return "Done";
      if (status === "progress") return "In Progress";
      return "Pending";
    }

    function getCompletionStats(id) {
      const ids = [Number(id)];
      const stack = [Number(id)];

      while (stack.length) {
        const current = stack.pop();
        const children = getChildren(current);
        for (const childId of children) {
          ids.push(Number(childId));
          stack.push(Number(childId));
        }
      }

      const nodes = ids.map(getNodeById).filter(Boolean);
      const total = nodes.length;
      const complete = nodes.filter(n => n.status === "complete").length;
      const progress = nodes.filter(n => n.status === "progress").length;
      const pending = total - complete - progress;
      const percent = total ? Math.round((complete / total) * 100) : 0;

      return { total, complete, progress, pending, percent };
    }

    function updateStats() {
      const total = graphData.nodes.length;
      const complete = graphData.nodes.filter(n => n.status === "complete").length;
      const progress = graphData.nodes.filter(n => n.status === "progress").length;
      const pending = total - complete - progress;

      document.getElementById("statTotal").textContent = total;
      document.getElementById("statComplete").textContent = complete;
      document.getElementById("statProgress").textContent = progress;
      document.getElementById("statPending").textContent = pending;

      const rootNode = getNodeById(rootId);
      const badge = document.getElementById("rootStatusBadge");
      badge.className = `statusBadge status-${rootNode?.status || "pending"}`;
      badge.textContent = getStatusLabel(rootNode?.status || "pending");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function matchesSearch(node, search) {
      if (!search) return true;
      const hay = `${node.label} ${node.description}`.toLowerCase();
      return hay.includes(search);
    }

    function subtreeMatches(id, search) {
      const node = getNodeById(id);
      if (!node) return false;
      if (matchesSearch(node, search)) return true;
      return getChildren(id).some(childId => subtreeMatches(childId, search));
    }

    function createStatusBadge(status) {
      return `<span class="statusBadge status-${status}">${getStatusLabel(status)}</span>`;
    }

    function countDescendants(id) {
      let count = 0;
      const stack = [...getChildren(id)];
      while (stack.length) {
        const current = stack.pop();
        count++;
        stack.push(...getChildren(current));
      }
      return count;
    }

    function moveTopLevelPanel(id, direction) {
      const topLevel = getChildren(rootId).slice();
      const currentIndex = topLevel.indexOf(Number(id));
      if (currentIndex === -1) return;

      const targetIndex = currentIndex + direction;
      if (targetIndex < 0 || targetIndex >= topLevel.length) return;

      const node = getNodeById(id);
      const targetNode = getNodeById(topLevel[targetIndex]);
      if (!node || !targetNode) return;

      const nodeX = typeof node.x === "number" ? node.x : currentIndex;
      const targetX = typeof targetNode.x === "number" ? targetNode.x : targetIndex;

      node.x = targetX;
      targetNode.x = nodeX;

      rebuildMaps();
      renderPanels();
      markDirty();
    }

    function updateNodeFromInputs(id) {
      const node = getNodeById(id);
      if (!node) return;

      const labelEl = document.getElementById(`label-${id}`);
      const descEl = document.getElementById(`desc-${id}`);
      const statusEl = document.getElementById(`status-${id}`);

      node.label = (labelEl?.value || "").trim() || "Unnamed";
      node.description = descEl?.value || "";
      node.status = statusEl?.value || "pending";

      rebuildMaps();
      updateStats();
      renderRootPanel();
      renderPanels();
      markDirty();
    }

    function addChild(id) {
      const newId = graphData.nodes.length
        ? Math.max(...graphData.nodes.map(n => Number(n.id))) + 1
        : 1;

      graphData.nodes.push({
        id: newId,
        label: "New Node",
        status: "pending",
        description: "Coming Soon",
        x: null,
        y: null
      });

      graphData.edges.push({
        id: `${id}->${newId}-${Date.now()}`,
        from: Number(id),
        to: Number(newId)
      });

      expandedNodes.add(Number(id));
      rebuildMaps();
      updateStats();
      renderRootPanel();
      renderPanels();
      markDirty();
    }

    function deleteNode(id) {
      if (Number(id) === Number(rootId)) {
        alert("You can't delete the root node.");
        return;
      }

      const idsToDelete = new Set();
      const stack = [Number(id)];

      while (stack.length) {
        const current = stack.pop();
        idsToDelete.add(current);
        for (const childId of getChildren(current)) stack.push(childId);
      }

      graphData.nodes = graphData.nodes.filter(n => !idsToDelete.has(Number(n.id)));
      graphData.edges = graphData.edges.filter(
        e => !idsToDelete.has(Number(e.from)) && !idsToDelete.has(Number(e.to))
      );

      rebuildMaps();
      updateStats();
      renderRootPanel();
      renderPanels();
      markDirty();
    }

    function toggleSection(id) {
      if (expandedNodes.has(id)) expandedNodes.delete(id);
      else expandedNodes.add(id);
      renderPanels();
    }

    function renderProgressBar(stats) {
      return `
        <div class="progressWrap">
          <div class="progressText">${stats.complete} / ${stats.total} complete (${stats.percent}%)</div>
          <div class="progressTrack">
            <div class="progressFill" style="width:${stats.percent}%"></div>
          </div>
        </div>
      `;
    }

    function renderTreeNode(id, search) {
      const node = getNodeById(id);
      if (!node) return "";

      const children = getChildren(id).filter(childId => subtreeMatches(childId, search));
      const selfMatch = matchesSearch(node, search);
      const subtreeMatch = selfMatch || children.length > 0;
      if (!subtreeMatch) return "";

      const isExpanded = expandedNodes.has(id) || !!search;
      const hasChildren = children.length > 0;
      const matchedClass = selfMatch ? " matched" : "";
      const stats = getCompletionStats(id);

      return `
        <div class="treeNode${matchedClass}${node.status === "complete" ? " completeNode" : ""}">
          <div class="treeNodeHeader">
            <div>
              <h3 class="treeNodeTitle">${escapeHtml(node.label)}</h3>
            </div>
            ${createStatusBadge(node.status)}
          </div>

          <div class="smallRow" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
            <span class="metaChip">${stats.total - 1} nested</span>
            <span class="metaChip">${stats.percent}% done</span>
          </div>

          ${renderProgressBar(stats)}

          <div class="editorGrid">
            <input id="label-${id}" type="text" value="${escapeHtml(node.label)}" placeholder="Label" />
            <textarea id="desc-${id}" placeholder="Description">${escapeHtml(node.description || "")}</textarea>
            <select id="status-${id}">
              <option value="pending" ${node.status === "pending" ? "selected" : ""}>Pending</option>
              <option value="progress" ${node.status === "progress" ? "selected" : ""}>In Progress</option>
              <option value="complete" ${node.status === "complete" ? "selected" : ""}>Complete</option>
            </select>
          </div>

          <div class="nodeActions">
            <button onclick="updateNodeFromInputs(${id})">Apply</button>
            <button onclick="addChild(${id})">Add Child</button>
            ${hasChildren ? `<button onclick="toggleSection(${id})">${isExpanded ? "Collapse" : "Expand"} (${children.length})</button>` : ""}
            ${Number(id) !== Number(rootId) ? `<button class="dangerBtn" onclick="deleteNode(${id})">Delete</button>` : ""}
          </div>

          ${hasChildren && isExpanded ? `<div class="childrenWrap">${children.map(childId => renderTreeNode(childId, search)).join("")}</div>` : ""}
        </div>
      `;
    }

    function renderRootPanel() {
      const rootNode = getNodeById(rootId);
      if (!rootNode) return;
      const stats = getCompletionStats(rootId);

      document.getElementById("rootPanel").innerHTML = `
        <div class="rootHeader">
          <div>
            <h2 class="rootTitle">${escapeHtml(rootNode.label)}</h2>
          </div>
          ${createStatusBadge(rootNode.status)}
        </div>

        <div class="panelTopMeta">
          <span class="metaChip">${stats.total - 1} total sub-items</span>
          <span class="metaChip">${stats.percent}% complete</span>
        </div>

        ${renderProgressBar(stats)}

        <div class="editorGrid">
          <input id="label-${rootNode.id}" type="text" value="${escapeHtml(rootNode.label)}" placeholder="Label" />
          <textarea id="desc-${rootNode.id}" placeholder="Description">${escapeHtml(rootNode.description || "")}</textarea>
          <select id="status-${rootNode.id}">
            <option value="pending" ${rootNode.status === "pending" ? "selected" : ""}>Pending</option>
            <option value="progress" ${rootNode.status === "progress" ? "selected" : ""}>In Progress</option>
            <option value="complete" ${rootNode.status === "complete" ? "selected" : ""}>Complete</option>
          </select>
        </div>

        <div class="nodeActions">
          <button onclick="updateNodeFromInputs(${rootNode.id})">Apply Root Changes</button>
          <button onclick="addChild(${rootNode.id})">Add Top-Level Panel</button>
        </div>
      `;
    }

    function renderPanels() {
      const panelsEl = document.getElementById("panels");
      const mainChildren = getChildren(rootId);
      const search = currentSearch.trim().toLowerCase();

      panelsEl.innerHTML = mainChildren.map((id, index) => {
        const node = getNodeById(id);
        if (!node) return "";

        const visible = subtreeMatches(id, search);
        const childIds = getChildren(id).filter(childId => subtreeMatches(childId, search));
        const descendants = countDescendants(id);
        const stats = getCompletionStats(id);

        return `
          <article class="panel status-panel-${node.status}${visible ? "" : " hiddenBySearch"}">
            <div class="panelHeader">
              <div class="panelHeaderText">
                <h2>${escapeHtml(node.label)}</h2>
                <p class="panelDescription">${escapeHtml(node.description || "No description yet.")}</p>
              </div>
              ${createStatusBadge(node.status)}
            </div>

            <div class="panelTopMeta">
              <span class="metaChip">${descendants} sub-items</span>
              <span class="metaChip">${childIds.length} direct children</span>
              <span class="metaChip">${stats.percent}% complete</span>
            </div>

            ${renderProgressBar(stats)}

            <div class="editorGrid">
              <input id="label-${id}" type="text" value="${escapeHtml(node.label)}" placeholder="Label" />
              <textarea id="desc-${id}" placeholder="Description">${escapeHtml(node.description || "")}</textarea>
              <select id="status-${id}">
                <option value="pending" ${node.status === "pending" ? "selected" : ""}>Pending</option>
                <option value="progress" ${node.status === "progress" ? "selected" : ""}>In Progress</option>
                <option value="complete" ${node.status === "complete" ? "selected" : ""}>Complete</option>
              </select>
            </div>

            <div class="nodeActions">
              <button onclick="updateNodeFromInputs(${id})">Apply</button>
              <button onclick="addChild(${id})">Add Child</button>
              <button class="subtleBtn" onclick="moveTopLevelPanel(${id}, -1)" ${index === 0 ? "disabled" : ""}>Move Left</button>
              <button class="subtleBtn" onclick="moveTopLevelPanel(${id}, 1)" ${index === mainChildren.length - 1 ? "disabled" : ""}>Move Right</button>
              <button class="dangerBtn" onclick="deleteNode(${id})">Delete Panel</button>
            </div>

            <div class="panelBody">
              ${childIds.length
                ? childIds.map(childId => renderTreeNode(childId, search)).join("")
                : `<div class="emptyState">No child items yet.</div>`
              }
            </div>
          </article>
        `;
      }).join("");
    }

    function expandAllSections() {
      for (const node of graphData.nodes) {
        if (getChildren(node.id).length) expandedNodes.add(node.id);
      }
      renderPanels();
    }

    function collapseAllSections() {
      expandedNodes.clear();
      renderPanels();
    }

    async function reloadRoadmap() {
      try {
        showLoading("Loading roadmap...");
        setStatus("Loading latest roadmap...");

        const res = await fetch(RAW_JSON_URL + "?v=" + Date.now(), {
          cache: "no-store"
        });

        if (!res.ok) throw new Error("Could not load roadmap.json");

        graphData = normalizeGraphData(await res.json());
        rebuildMaps();
        rootId = getRootId();
        updateStats();
        renderRootPanel();
        renderPanels();

        hideErrorPanel();
        clearDirty();
        hideLoading();
      } catch (err) {
        console.error(err);
        setStatus("Failed to load roadmap.", true);
        showErrorPanel("Roadmap refresh failed. Try again in a moment.");
        hideLoading();
      }
    }

    async function saveRoadmap() {
      try {
        setStatus("Saving to GitHub...");

        const payload = {
          nodes: graphData.nodes.map(n => ({
            id: n.id,
            label: n.label,
            status: n.status,
            description: n.description,
            x: n.x,
            y: n.y
          })),
          edges: graphData.edges.map(e => ({
            from: e.from,
            to: e.to
          }))
        };

        const res = await fetch(SAVE_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ data: payload })
        });

        const text = await res.text();
        if (!res.ok) throw new Error(text || "Save failed");

        hideErrorPanel();
        clearDirty();
      } catch (err) {
        console.error(err);
        setStatus("Save failed.", true);
        showErrorPanel("Saving failed. Check your Worker or try again.");
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const input = document.getElementById("searchInput");
      input.addEventListener("input", () => {
        currentSearch = input.value || "";
        renderPanels();
      });
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) reloadRoadmap();
    });

    window.updateNodeFromInputs = updateNodeFromInputs;
    window.addChild = addChild;
    window.deleteNode = deleteNode;
    window.toggleSection = toggleSection;
    window.expandAllSections = expandAllSections;
    window.collapseAllSections = collapseAllSections;
    window.reloadRoadmap = reloadRoadmap;
    window.saveRoadmap = saveRoadmap;
    window.moveTopLevelPanel = moveTopLevelPanel;

    reloadRoadmap();
  </script>
</body>
</html>
