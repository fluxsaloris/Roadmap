<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
body { margin:0; background:black; color:white; overflow:hidden; font-family:Arial; }
#graph { position:fixed; inset:0; }

#panel {
  position:absolute;
  bottom:20px;
  right:20px;
}

button {
  display:block;
  margin:5px 0;
  padding:6px;
  background:#111;
  color:#aaa;
  border:1px solid #333;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="graph"></div>

<div id="panel">
  <button onclick="addNode()">Add</button>
  <button onclick="editNode()">Edit</button>
  <button onclick="deleteNode()">Delete</button>
  <button onclick="save()">💾 Save</button>
</div>

<script>
let network;
let nodes = new vis.DataSet([]);
let edges = [];
let selected = null;

function load() {
  fetch("./roadmap.json?v=" + Date.now())
    .then(r => r.json())
    .then(data => {
      nodes.clear();
      nodes.add(data.nodes);
      edges = data.edges;

      network.setData({ nodes, edges });
    });
}

network = new vis.Network(
  document.getElementById("graph"),
  { nodes, edges },
  {
    layout: { hierarchical: { direction: "LR" } },
    physics: false
  }
);

network.on("click", params => {
  selected = params.nodes[0];
});

function addNode() {
  if (!selected) return alert("Select node");

  const id = Date.now();

  nodes.add({
    id,
    label: "New Node",
    status: "pending",
    description: "..."
  });

  edges.push({ from: selected, to: id });
  network.setData({ nodes, edges });
}

function editNode() {
  if (!selected) return;

  const n = nodes.get(selected);

  n.label = prompt("Label", n.label);
  n.description = prompt("Desc", n.description);
  n.status = prompt("Status", n.status);

  nodes.update(n);
}

function deleteNode() {
  if (!selected) return;

  nodes.remove(selected);
  edges = edges.filter(e => e.from !== selected && e.to !== selected);

  network.setData({ nodes, edges });
}

async function save() {
  const data = {
    nodes: nodes.get(),
    edges: edges
  };

  const res = await fetch("/api/save", {
    method: "POST",
    credentials: "same-origin",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ data })
  });

  const txt = await res.text();

  if (!res.ok) {
    alert(txt);
    return;
  }

  alert("Saved ✅");
}

load();
</script>

</body>
</html>
