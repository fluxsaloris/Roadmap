<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Roadmap Editor</title>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow: hidden;
}

#graph {
  position: fixed;
  inset: 0;
}

/* 🔐 Login */
#loginScreen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

#loginBox {
  background: #111;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

#loginBox input {
  padding: 8px;
  margin: 10px 0;
}

/* 🎮 Controls */
#editor {
  position: absolute;
  bottom: 100px;
  right: 20px;
}

#controls {
  position: absolute;
  bottom: 20px;
  right: 20px;
}

button {
  display: block;
  width: 140px;
  margin: 4px 0;
  padding: 6px;
  background: #111;
  color: #aaa;
  border: 1px solid #333;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginScreen">
  <div id="loginBox">
    <h2>Editor Access</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="checkPassword()">Enter</button>
  </div>
</div>

<div id="graph"></div>

<div id="editor">
  <button onclick="addChild()">Add Child</button>
  <button onclick="editNode()">Edit Node</button>
  <button onclick="deleteNode()">Delete Node</button>
  <button onclick="saveToGitHub()">💾 Save</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="controls">
  <button onclick="zoomIn()">Zoom +</button>
  <button onclick="zoomOut()">Zoom -</button>
  <button onclick="resetView()">Reset</button>
</div>

<script>

// 🔐 CHANGE THIS
const PASSWORD = "Nexus.?!?!.Axraex!1986?2004!!??Flux!Saloris";

// 🌐 CHANGE THIS (your worker URL)
const WORKER_URL = "https://roadmap-save.flux-saloris.workers.dev";

// 🔒 MUST MATCH CLOUDFLARE SECRET
const SECRET_KEY = "Nexus-FluxSaloris.3783573985367209572039751986_sadfibsdginsdidngisdngisdngiAxraex";

let network, nodes;
let selectedNodeId = null;
let nodeMap = {};

// 🌳 TREE
let tree = {
  label: "Dungeon Call",
  status: "complete",
  description: "Start",
  children: []
};

// 🎨 COLORS
function getColor(status) {
  if (status === "complete") return { background: "#00cc66" };
  if (status === "progress") return { background: "#ffaa00" };
  return { background: "#111" };
}

// 🔁 TREE → GRAPH
function generateGraph() {
  let id = 1;
  let nodesArr = [];
  let edgesArr = [];
  nodeMap = {};

  function walk(node, parent=null) {
    if (!node.children) node.children = [];

    const currentId = id++;
    nodeMap[currentId] = node;

    nodesArr.push({
      id: currentId,
      label: node.label,
      shape: "box",
      color: getColor(node.status)
    });

    if (parent) edgesArr.push({ from: parent, to: currentId });

    node.children.forEach(child => walk(child, currentId));
  }

  walk(tree);

  nodes.clear();
  nodes.add(nodesArr);
  network.setData({ nodes: nodes, edges: edgesArr });

  setTimeout(() => network.focus(1, { scale: 1.2 }), 100);
}

// 🖱 CLICK
network = new vis.Network(
  document.getElementById("graph"),
  { nodes: new vis.DataSet(), edges: [] },
  {
    layout: {
      hierarchical: {
        direction: "LR",
        levelSeparation: 250
      }
    },
    physics: false
  }
);

nodes = network.body.data.nodes;

network.on("click", params => {
  selectedNodeId = params.nodes[0] || null;
});

// ➕ ADD
function addChild() {
  if (!selectedNodeId) return alert("Select node first");

  const parent = nodeMap[selectedNodeId];

  parent.children.push({
    label: "New Node",
    status: "pending",
    description: "Coming Soon",
    children: []
  });

  generateGraph();
}

// ✏️ EDIT
function editNode() {
  if (!selectedNodeId) return alert("Select node first");

  const n = nodeMap[selectedNodeId];

  n.label = prompt("Name:", n.label) || n.label;
  n.description = prompt("Description:", n.description) || n.description;
  n.status = prompt("Status (complete/progress/pending):", n.status) || n.status;

  generateGraph();
}

// ❌ DELETE
function deleteNode() {
  if (!selectedNodeId) return alert("Select node first");

  const target = nodeMap[selectedNodeId];

  function remove(parent) {
    if (!parent.children) return;
    parent.children = parent.children.filter(c => c !== target);
    parent.children.forEach(remove);
  }

  if (tree === target) return alert("Cannot delete root");

  remove(tree);
  selectedNodeId = null;

  generateGraph();
}

// 🔁 BUILD JSON
function buildGraphJSON() {
  let nodes = [], edges = [], id = 1;

  function walk(n, parent=null) {
    const cur = id++;

    nodes.push({
      id: cur,
      label: n.label,
      status: n.status,
      description: n.description
    });

    if (parent) edges.push({ from: parent, to: cur });

    n.children.forEach(c => walk(c, cur));
  }

  walk(tree);
  return { nodes, edges };
}

// 💾 SAVE (SECURE)
async function saveToGitHub() {
  try {
    const data = buildGraphJSON();

    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + SECRET_KEY
      },
      body: JSON.stringify({ data })
    });

    if (!res.ok) {
      alert("Save failed");
      return;
    }

    alert("Saved to GitHub ✅");

  } catch (err) {
    console.error(err);
    alert("Error saving");
  }
}

// 🔐 LOGIN
function checkPassword() {
  if (document.getElementById("passwordInput").value === PASSWORD) {
    document.getElementById("loginScreen").style.display = "none";
  } else {
    alert("Wrong password");
  }
}

function logout() {
  location.reload();
}

// 🔍 CONTROLS
function zoomIn() { network.moveTo({ scale: network.getScale() * 1.2 }); }
function zoomOut() { network.moveTo({ scale: network.getScale() * 0.8 }); }
function resetView() { network.focus(1, { scale: 1.2 }); }

// 🚀 INIT
generateGraph();

</script>

</body>
</html>
