<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dungeon Call Roadmap Editor</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: #000 !important;
      color: white;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
      background: radial-gradient(circle at 30% 20%, #111, #000 70%) !important;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.85), transparent),
        radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 50% 40%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.7), transparent);
      opacity: 0.35;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      border: 2px solid #BE1A48;
      border-radius: 14px;
      pointer-events: none;
      box-shadow: 0 0 25px rgba(190, 26, 72, 0.3);
      margin: 6px;
      z-index: 2;
    }

    #graph {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: transparent !important;
    }

    #topPanel {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 20;
      width: min(480px, calc(100vw - 40px));
      background: rgba(15, 15, 15, 0.9);
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px rgba(0,0,0,0.35);
    }

    #topPanel h1 {
      margin: 0 0 6px;
      font-size: 22px;
      line-height: 1.2;
      color: #fff;
    }

    #topPanel p {
      margin: 0 0 10px;
      color: #bbb;
      font-size: 14px;
      line-height: 1.45;
    }

    #statusBar {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
    }

    #nodeEditor,
    #editorPanel,
    #controls,
    #infoBox,
    #errorPanel {
      z-index: 20;
    }

    #nodeEditor {
      position: fixed;
      top: 18px;
      right: 18px;
      width: min(320px, calc(100vw - 40px));
      background: rgba(20, 20, 20, 0.96);
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 14px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    #nodeEditor h3 {
      margin: 0 0 12px;
      font-size: 18px;
      color: #fff;
    }

    #nodeEditor label {
      display: block;
      margin: 10px 0 6px;
      font-size: 12px;
      color: #bbb;
    }

    #nodeEditor input,
    #nodeEditor textarea,
    #nodeEditor select {
      width: 100%;
      box-sizing: border-box;
      background: #111;
      color: #e5e5e5;
      border: 1px solid #303030;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }

    #nodeEditor input:focus,
    #nodeEditor textarea:focus,
    #nodeEditor select:focus {
      border-color: #BE1A48;
      box-shadow: 0 0 0 2px rgba(190, 26, 72, 0.2);
    }

    #nodeEditor textarea {
      min-height: 110px;
      resize: vertical;
    }

    #nodeEditor button {
      width: 100%;
      margin-top: 12px;
    }

    .editorNote {
      margin-top: 10px;
      font-size: 12px;
      color: #8d8d8d;
      line-height: 1.4;
    }

    #editorPanel,
    #controls {
      position: fixed;
      right: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #editorPanel {
      bottom: 170px;
    }

    #controls {
      bottom: 18px;
    }

    button {
      background: #111;
      color: #ddd;
      border: 1px solid #2b2b2b;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
      min-width: 150px;
    }

    button:hover {
      background: #171717;
    }

    #infoBox {
      position: fixed;
      width: clamp(240px, 28vw, 340px);
      max-height: min(60vh, 420px);
      overflow-y: auto;
      background: rgba(20, 20, 20, 0.96);
      border: 1px solid #2a2a2a;
      backdrop-filter: blur(12px);
      padding: 14px;
      border-radius: 14px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      color: white;
      display: none;
    }

    #infoBox h3 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.3;
      color: #fff;
    }

    #infoBox p {
      font-size: 13px;
      line-height: 1.5;
      color: #d7d7d7;
      white-space: pre-wrap;
      margin: 10px 0 0;
    }

    #closeBtn {
      position: absolute;
      top: 8px;
      right: 10px;
      cursor: pointer;
      color: #aaa;
      font-size: 14px;
    }

    #statusBadge {
      display: inline-block;
      margin: 2px 0 8px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    #toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%) translateY(20px);
      z-index: 50;
      background: rgba(18, 18, 18, 0.95);
      color: #f0f0f0;
      border: 1px solid #363636;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 13px;
      box-shadow: 0 0 15px rgba(0,0,0,0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #errorPanel {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: min(420px, calc(100vw - 40px));
      background: rgba(35, 12, 18, 0.96);
      border: 1px solid rgba(190, 26, 72, 0.5);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 0 20px rgba(190, 26, 72, 0.18);
      backdrop-filter: blur(10px);
      display: none;
    }

    #errorPanel.show {
      display: block;
    }

    #errorPanelTitle {
      font-size: 14px;
      font-weight: 700;
      color: #ffb3c9;
      margin-bottom: 6px;
    }

    #errorPanelText {
      font-size: 13px;
      line-height: 1.45;
      color: #f2d7df;
    }

    @media (max-width: 1100px) {
      #topPanel {
        width: calc(100vw - 36px);
      }

      #nodeEditor {
        top: auto;
        bottom: 18px;
        left: 18px;
        right: 18px;
        width: auto;
      }

      #editorPanel {
        bottom: 320px;
      }
    }
  </style>
</head>
<body>
  <div id="graph"></div>

  <div id="topPanel">
    <h1>Dungeon Call Editor</h1>
    <p>Edit roadmap nodes, update progress, and push changes live to GitHub.</p>
    <div id="statusBar">Loading latest roadmap from GitHub...</div>
  </div>

  <div id="nodeEditor">
    <h3>Node Editor</h3>

    <label for="nodeLabel">Label</label>
    <input id="nodeLabel" type="text" placeholder="Select a node..." />

    <label for="nodeDescription">Description</label>
    <textarea id="nodeDescription" placeholder="Node description..."></textarea>

    <label for="nodeStatus">Status</label>
    <select id="nodeStatus">
      <option value="pending">Pending</option>
      <option value="progress">In Progress</option>
      <option value="complete">Complete</option>
    </select>

    <button onclick="applyNodeChanges()">Apply Changes</button>

    <div class="editorNote">
      Click a node in the graph to load it here.
    </div>
  </div>

  <div id="infoBox"></div>
  <div id="toast"></div>

  <div id="errorPanel">
    <div id="errorPanelTitle">Couldn’t load roadmap</div>
    <div id="errorPanelText">Try refreshing or check your connection.</div>
  </div>

  <div id="editorPanel">
    <button onclick="addChild()">Add Child</button>
    <button onclick="deleteNode()">Delete Node</button>
    <button onclick="saveRoadmap()">Save to GitHub</button>
    <button onclick="reloadFromGitHub()">Reload from GitHub</button>
    <button onclick="exportCurrentGraph()">Export JSON</button>
  </div>

  <div id="controls">
    <button onclick="zoomIn()">Zoom +</button>
    <button onclick="zoomOut()">Zoom -</button>
    <button onclick="resetView()">Reset</button>
  </div>

  <script>
    const START_NODE_ID = 1;
    const SAVE_URL = "https://roadmap.flux-saloris.workers.dev";
    const RAW_JSON_URL = "https://raw.githubusercontent.com/fluxsaloris/Roadmap/main/roadmap.json";

    let network;
    let nodes;
    let selectedNodeId = null;
    let nodeMap = {};
    let tree = null;
    let toastTimer = null;

    function setStatus(message, isError = false) {
      const bar = document.getElementById("statusBar");
      bar.textContent = message;
      bar.style.color = isError ? "#ff8a8a" : "#999";
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 3000);
    }

    function showErrorPanel(message) {
      document.getElementById("errorPanelText").textContent = message;
      document.getElementById("errorPanel").classList.add("show");
    }

    function hideErrorPanel() {
      document.getElementById("errorPanel").classList.remove("show");
    }

    function getColor(status) {
      if (status === "complete") {
        return { background: "#00cc66", border: "#00994d", font: { color: "#003322" } };
      }
      if (status === "progress") {
        return { background: "#ffaa00", border: "#cc8800", font: { color: "#222" } };
      }
      return { background: "#111", border: "#333", font: { color: "#777" } };
    }

    function getStatusLabel(status) {
      if (status === "complete") return "Done";
      if (status === "progress") return "In Progress";
      return "Not Started";
    }

    function getStatusBadgeStyle(status) {
      if (status === "complete") {
        return "background:#123a24;color:#7dffb0;border:1px solid #1e6c41;";
      }
      if (status === "progress") {
        return "background:#3d2b06;color:#ffd37a;border:1px solid #9a6a00;";
      }
      return "background:#181818;color:#999;border:1px solid #333;";
    }

    function positionInfoBox(domX, domY) {
      const box = document.getElementById("infoBox");
      const padding = 12;

      requestAnimationFrame(() => {
        const rect = box.getBoundingClientRect();

        let left = domX + 16;
        let top = domY - 16;

        if (left + rect.width > window.innerWidth - padding) {
          left = domX - rect.width - 16;
        }

        if (top + rect.height > window.innerHeight - padding) {
          top = window.innerHeight - rect.height - padding;
        }

        if (top < padding) top = padding;
        if (left < padding) left = padding;

        box.style.left = left + "px";
        box.style.top = top + "px";
      });
    }

    function buildTreeFromGraph(graphData) {
      const graphNodes = Array.isArray(graphData?.nodes) ? graphData.nodes : [];
      const graphEdges = Array.isArray(graphData?.edges) ? graphData.edges : [];

      if (!graphNodes.length) {
        return {
          label: "Dungeon Call",
          status: "complete",
          description: "Start",
          children: []
        };
      }

      const byId = {};
      const childIds = new Set();
      const childrenLookup = {};

      for (const node of graphNodes) {
        byId[node.id] = {
          label: node.label || "Unnamed",
          status: node.status || "pending",
          description: node.description || "Coming Soon",
          children: []
        };
        childrenLookup[node.id] = [];
      }

      for (const edge of graphEdges) {
        if (byId[edge.from] && byId[edge.to]) {
          childrenLookup[edge.from].push(edge.to);
          childIds.add(edge.to);
        }
      }

      function attach(id) {
        const node = byId[id];
        node.children = childrenLookup[id].map(childId => attach(childId));
        return node;
      }

      let rootId = graphNodes[0].id;
      const explicitRoot = graphNodes.find(n => !childIds.has(n.id));
      if (explicitRoot) rootId = explicitRoot.id;

      return attach(rootId);
    }

    function buildGraphFromTree(treeRoot) {
      let nextId = 1;
      const outNodes = [];
      const outEdges = [];
      nodeMap = {};

      function walk(node, parentId = null) {
        if (!node.children) node.children = [];

        const currentId = nextId++;
        nodeMap[currentId] = node;

        outNodes.push({
          id: currentId,
          label: node.label || "Unnamed",
          shape: "box",
          margin: 14,
          color: getColor(node.status || "pending"),
          description: node.description || "Coming Soon",
          status: node.status || "pending"
        });

        if (parentId !== null) {
          outEdges.push({ from: parentId, to: currentId });
        }

        for (const child of node.children) {
          walk(child, currentId);
        }
      }

      walk(treeRoot);
      return { nodes: outNodes, edges: outEdges };
    }

    function buildGraphJSON() {
      const outNodes = [];
      const outEdges = [];
      let nextId = 1;

      function walk(node, parentId = null) {
        if (!node.children) node.children = [];

        const currentId = nextId++;

        outNodes.push({
          id: currentId,
          label: node.label || "Unnamed",
          status: node.status || "pending",
          description: node.description || "Coming Soon"
        });

        if (parentId !== null) {
          outEdges.push({ from: parentId, to: currentId });
        }

        for (const child of node.children) {
          walk(child, currentId);
        }
      }

      walk(tree);
      return { nodes: outNodes, edges: outEdges };
    }

    function renderGraph() {
      const graph = buildGraphFromTree(tree);
      nodes.clear();
      nodes.add(graph.nodes);
      network.setData({ nodes, edges: graph.edges });
    }

    async function reloadFromGitHub() {
      try {
        setStatus("Loading latest roadmap from GitHub...");

        const res = await fetch(RAW_JSON_URL + "?v=" + Date.now(), {
          cache: "no-store"
        });

        if (!res.ok) {
          throw new Error("Could not load roadmap.json from GitHub");
        }

        const graphData = await res.json();
        tree = buildTreeFromGraph(graphData);
        renderGraph();
        selectedNodeId = null;
        clearEditorFields();
        document.getElementById("infoBox").style.display = "none";
        hideErrorPanel();
        setStatus("Loaded latest roadmap from GitHub.");
      } catch (err) {
        console.error(err);
        setStatus("Failed to load roadmap from GitHub.", true);
        showErrorPanel("Roadmap refresh failed. Try refreshing again in a moment.");
      }
    }

    function loadSelectedNodeIntoEditor() {
      if (!selectedNodeId || !nodeMap[selectedNodeId]) {
        clearEditorFields();
        return;
      }

      const node = nodeMap[selectedNodeId];
      document.getElementById("nodeLabel").value = node.label || "";
      document.getElementById("nodeDescription").value = node.description || "";
      document.getElementById("nodeStatus").value = node.status || "pending";
    }

    function clearEditorFields() {
      document.getElementById("nodeLabel").value = "";
      document.getElementById("nodeDescription").value = "";
      document.getElementById("nodeStatus").value = "pending";
    }

    function applyNodeChanges() {
      if (!selectedNodeId) {
        showToast("Select a node first.");
        return;
      }

      const node = nodeMap[selectedNodeId];
      node.label = document.getElementById("nodeLabel").value.trim() || "Unnamed";
      node.description = document.getElementById("nodeDescription").value;
      node.status = document.getElementById("nodeStatus").value;

      renderGraph();
      setStatus("Node updated. Save when ready.");
      showToast("Node changes applied.");
    }

    function addChild() {
      if (!selectedNodeId) {
        showToast("Select a node first.");
        return;
      }

      const parent = nodeMap[selectedNodeId];
      if (!parent.children) parent.children = [];

      parent.children.push({
        label: "New Node",
        status: "pending",
        description: "Coming Soon",
        children: []
      });

      renderGraph();
      setStatus("Child node added. Select it to edit details.");
      showToast("Child node added.");
    }

    function deleteNode() {
      if (!selectedNodeId) {
        showToast("Select a node first.");
        return;
      }

      const target = nodeMap[selectedNodeId];

      if (tree === target) {
        showToast("You can't delete the root.");
        return;
      }

      function removeFrom(parent) {
        if (!parent.children) return false;

        const originalLength = parent.children.length;
        parent.children = parent.children.filter(child => child !== target);

        if (parent.children.length !== originalLength) {
          return true;
        }

        for (const child of parent.children) {
          if (removeFrom(child)) return true;
        }

        return false;
      }

      removeFrom(tree);
      selectedNodeId = null;
      clearEditorFields();
      document.getElementById("infoBox").style.display = "none";
      renderGraph();
      setStatus("Node deleted. Save when ready.");
      showToast("Node deleted.");
    }

    async function saveRoadmap() {
      try {
        setStatus("Saving to GitHub...");

        const data = buildGraphJSON();

        const res = await fetch(SAVE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ data })
        });

        const text = await res.text();

        if (!res.ok) {
          console.error(text);
          throw new Error(text || "Save failed");
        }

        hideErrorPanel();
        setStatus("Saved to GitHub.");
        showToast("Saved to GitHub.");
      } catch (err) {
        console.error(err);
        setStatus("Save failed.", true);
        showErrorPanel("Saving failed. Check your Worker or try again.");
      }
    }

    function exportCurrentGraph() {
      const data = buildGraphJSON();
      console.log(JSON.stringify(data, null, 2));
      showToast("Graph JSON printed to console.");
    }

    function zoomIn() {
      network.moveTo({ scale: network.getScale() * 1.2 });
    }

    function zoomOut() {
      network.moveTo({ scale: network.getScale() * 0.8 });
    }

    function resetView() {
      network.focus(START_NODE_ID, { scale: 1.2, animation: false });
      setStatus("View reset.");
    }

    nodes = new vis.DataSet();

    network = new vis.Network(
      document.getElementById("graph"),
      { nodes: nodes, edges: [] },
      {
        layout: {
          hierarchical: {
            direction: "LR",
            levelSeparation: 250,
            nodeSpacing: 200
          }
        },
        physics: false,
        interaction: {
          dragNodes: false
        }
      }
    );

    network.on("click", function(params) {
      const info = document.getElementById("infoBox");

      if (!params.nodes.length) {
        selectedNodeId = null;
        clearEditorFields();
        info.style.display = "none";
        return;
      }

      selectedNodeId = params.nodes[0];
      const node = nodes.get(selectedNodeId);
      loadSelectedNodeIntoEditor();

      info.innerHTML =
        '<div id="closeBtn">✕</div>' +
        `<h3>${node.label}</h3>` +
        `<div id="statusBadge" style="${getStatusBadgeStyle(node.status)}">${getStatusLabel(node.status)}</div>` +
        `<p>${node.description || "No description available."}</p>`;

      info.style.display = "block";
      positionInfoBox(params.pointer.DOM.x, params.pointer.DOM.y);

      document.getElementById("closeBtn").onclick = () => {
        info.style.display = "none";
      };
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        reloadFromGitHub();
      }
    });

    reloadFromGitHub();
  </script>
</body>
</html>
