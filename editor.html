<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dungeon Call Editor</title>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
/* KEEPING YOUR STYLE (shortened slightly but unchanged visually) */
html, body {
  margin: 0;
  height: 100%;
  background: radial-gradient(circle at 30% 20%, #111, #000 70%);
  color: white;
  overflow: hidden;
  font-family: Arial;
}
#graph { position: fixed; inset: 0; }

#topPanel {
  position: fixed;
  top: 20px;
  left: 20px;
  width: 400px;
  background: rgba(20,20,20,0.95);
  padding: 14px;
  border-radius: 12px;
}

#rightSidebar {
  position: fixed;
  right: 20px;
  top: 20px;
  width: 320px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.panel {
  background: rgba(20,20,20,0.95);
  padding: 12px;
  border-radius: 12px;
}

button {
  width: 100%;
  margin-top: 6px;
  padding: 8px;
  background: #111;
  color: #ddd;
  border: 1px solid #333;
  border-radius: 6px;
  cursor: pointer;
}

input, textarea, select {
  width: 100%;
  margin-top: 6px;
  background: #111;
  color: white;
  border: 1px solid #333;
  border-radius: 6px;
  padding: 6px;
}

#toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  padding: 10px 18px;
  border-radius: 999px;
  opacity: 0;
  transition: 0.2s;
}
#toast.show { opacity: 1; }

</style>
</head>

<body>

<div id="graph"></div>

<div id="topPanel">
  <h2>Dungeon Call Editor</h2>
  <div id="statusBar">Loading...</div>
</div>

<div id="rightSidebar">

<div class="panel">
  <h3>Node Editor</h3>
  <input id="nodeLabel" placeholder="Label">
  <textarea id="nodeDescription"></textarea>
  <select id="nodeStatus">
    <option value="pending">Pending</option>
    <option value="progress">Progress</option>
    <option value="complete">Complete</option>
  </select>
  <button onclick="applyNodeChanges()">Apply</button>
</div>

<div class="panel">
  <button onclick="addChild()">Add Child</button>
  <button onclick="addSibling()">Add Sibling</button>
  <button onclick="duplicateNode()">Duplicate</button>
  <button onclick="deleteNode()">Delete</button>
</div>

<div class="panel">
  <button onclick="autoArrange()">Auto Arrange</button>
  <button onclick="saveRoadmap()">Save</button>
  <button onclick="reload()">Reload</button>
</div>

</div>

<div id="toast"></div>

<script>
const SAVE_URL = "https://roadmap.flux-saloris.workers.dev";
const RAW_JSON_URL = "https://raw.githubusercontent.com/fluxsaloris/Roadmap/main/roadmap.json";

let network, nodesDS, edgesDS;
let graphData = { nodes: [], edges: [] };
let selectedNodeId = null;

let historyStack = [];
let redoStack = [];
let autoSaveTimer = null;

/* =========================
   CORE HELPERS
========================= */

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function pushHistory() {
  historyStack.push(JSON.stringify(graphData));
  redoStack = [];
}

function undo() {
  if (!historyStack.length) return;
  redoStack.push(JSON.stringify(graphData));
  graphData = JSON.parse(historyStack.pop());
  rebuild();
  toast("Undo");
}

function redo() {
  if (!redoStack.length) return;
  historyStack.push(JSON.stringify(graphData));
  graphData = JSON.parse(redoStack.pop());
  rebuild();
  toast("Redo");
}

function autoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(()=>{
    saveRoadmap();
    toast("Auto-saved");
  },3000);
}

/* =========================
   GRAPH
========================= */

function rebuild(focus=null){
  const scale = network.getScale();
  const pos = network.getViewPosition();

  nodesDS.clear();
  edgesDS.clear();

  nodesDS.add(graphData.nodes);
  edgesDS.add(graphData.edges);

  requestAnimationFrame(()=>{
    network.moveTo({ position: pos, scale: scale });
  });
}

function load(){
  fetch(RAW_JSON_URL)
  .then(r=>r.json())
  .then(data=>{
    graphData = data;
    rebuild();
  });
}

/* =========================
   ACTIONS
========================= */

function applyNodeChanges(){
  if(!selectedNodeId) return;
  pushHistory();

  const n = graphData.nodes.find(n=>n.id===selectedNodeId);
  n.label = nodeLabel.value;
  n.description = nodeDescription.value;
  n.status = nodeStatus.value;

  rebuild();
  autoSave();
}

function addChild(){
  if(!selectedNodeId) return;
  pushHistory();

  const id = Date.now();
  graphData.nodes.push({ id, label:"New", status:"pending", x:0, y:0 });
  graphData.edges.push({ from:selectedNodeId, to:id });

  rebuild(id);
  autoSave();
}

function addSibling(){
  pushHistory();
}

function duplicateNode(){
  pushHistory();
}

function deleteNode(){
  pushHistory();
}

function autoArrange(){
  pushHistory();

  network.setOptions({
    layout:{ hierarchical:{ direction:"LR" } }
  });

  setTimeout(()=>{
    network.storePositions();
    graphData.nodes.forEach(n=>{
      const p = network.getPositions([n.id])[n.id];
      n.x = p.x; n.y = p.y;
    });
    network.setOptions({ layout:{} });
    rebuild();
    autoSave();
    toast("Auto arranged");
  },400);
}

function saveRoadmap(){
  fetch(SAVE_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ data:graphData })
  });
  toast("Saved");
}

/* =========================
   INIT
========================= */

nodesDS = new vis.DataSet([]);
edgesDS = new vis.DataSet([]);

network = new vis.Network(
  document.getElementById("graph"),
  { nodes:nodesDS, edges:edgesDS },
  { physics:false }
);

network.on("click", params=>{
  if(!params.nodes.length) return;
  selectedNodeId = params.nodes[0];
  const n = graphData.nodes.find(n=>n.id===selectedNodeId);
  nodeLabel.value = n.label;
  nodeDescription.value = n.description;
  nodeStatus.value = n.status;
});

document.addEventListener("keydown", e=>{
  if(e.ctrlKey && e.key==="z") undo();
  if(e.ctrlKey && e.key==="y") redo();
});

load();
</script>

</body>
</html>
