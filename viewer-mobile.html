<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dungeon Call Roadmap Mobile</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: radial-gradient(circle at 30% 20%, #111, #000 70%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        radial-gradient(1px 1px at 10% 20%, white, transparent),
        radial-gradient(1px 1px at 30% 70%, white, transparent),
        radial-gradient(1.5px 1.5px at 50% 40%, white, transparent),
        radial-gradient(1px 1px at 80% 60%, white, transparent);
      opacity: 0.4;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      border: 2px solid #BE1A48;
      border-radius: 14px;
      pointer-events: none;
      box-shadow: 0 0 25px rgba(190, 26, 72, 0.3);
      margin: 6px;
    }

    .container {
      padding: 18px 14px 90px;
      max-width: 760px;
      margin: 0 auto;
    }

    .hero {
      background: rgba(15, 15, 15, 0.9);
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px rgba(0,0,0,0.35);
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: 22px;
      line-height: 1.2;
    }

    .hero p {
      margin: 0;
      color: #bbb;
      font-size: 14px;
      line-height: 1.45;
    }

    .statsBar {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .statCard {
      background: rgba(20,20,20,0.9);
      border: 1px solid #2c2c2c;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .statValue {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .statLabel {
      margin-top: 3px;
      font-size: 11px;
      color: #9d9d9d;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .progressWrap {
      margin-top: 14px;
    }

    .progressText {
      font-size: 12px;
      color: #bbb;
      margin-bottom: 6px;
    }

    .progressTrack {
      width: 100%;
      height: 10px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      overflow: hidden;
    }

    .progressFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #BE1A48, #ff4f86);
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .toolbar button {
      flex: 1;
    }

    button {
      background: #111;
      color: #ddd;
      border: 1px solid #2b2b2b;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #171717;
    }

    .statusLine {
      margin-bottom: 14px;
      font-size: 13px;
      color: #aaa;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: rgba(20, 20, 20, 0.94);
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 0 15px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.3;
    }

    .card p {
      margin: 10px 0 0;
      font-size: 13px;
      line-height: 1.5;
      color: #d7d7d7;
      white-space: pre-wrap;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .cardTop {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .cardTopText {
      flex: 1;
      min-width: 0;
    }

    .branchBtn {
      white-space: nowrap;
      padding: 7px 10px;
      font-size: 12px;
      min-width: auto;
    }

    .depth-0 { margin-left: 0; border-left: 4px solid rgba(190, 26, 72, 0.9); }
    .depth-1 { margin-left: 8px; border-left: 4px solid rgba(190, 26, 72, 0.7); }
    .depth-2 { margin-left: 16px; border-left: 4px solid rgba(190, 26, 72, 0.5); }
    .depth-3 { margin-left: 24px; border-left: 4px solid rgba(190, 26, 72, 0.35); }
    .depth-4 { margin-left: 32px; border-left: 4px solid rgba(190, 26, 72, 0.2); }

    .empty {
      color: #999;
      font-size: 14px;
      text-align: center;
      padding: 20px 0;
    }

    #toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%) translateY(20px);
      z-index: 50;
      background: rgba(18, 18, 18, 0.95);
      color: #f0f0f0;
      border: 1px solid #363636;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 13px;
      box-shadow: 0 0 15px rgba(0,0,0,0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Dungeon Call Roadmap</h1>
      <p>Follow live development progress, see what is complete, what is in progress, and what is still planned.</p>

      <div class="statsBar">
        <div class="statCard">
          <div class="statValue" id="statTotal">0</div>
          <div class="statLabel">Total</div>
        </div>
        <div class="statCard">
          <div class="statValue" id="statComplete">0</div>
          <div class="statLabel">Done</div>
        </div>
        <div class="statCard">
          <div class="statValue" id="statProgress">0</div>
          <div class="statLabel">Progress</div>
        </div>
        <div class="statCard">
          <div class="statValue" id="statPending">0</div>
          <div class="statLabel">Pending</div>
        </div>
      </div>

      <div class="progressWrap">
        <div class="progressText" id="progressText">Completion: 0%</div>
        <div class="progressTrack">
          <div class="progressFill" id="progressFill"></div>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <button onclick="reloadRoadmap()">Refresh</button>
      <button onclick="expandAll()">Expand All</button>
    </div>

    <div class="statusLine" id="statusLine">Loading roadmap...</div>

    <div class="list" id="roadmapList"></div>
  </div>

  <div id="toast"></div>

  <script>
    const RAW_JSON_URL = "https://raw.githubusercontent.com/fluxsaloris/Roadmap/main/roadmap.json";
    const ROOT_ID = 1;

    let graphData = null;
    const collapsedNodes = new Set();
    let toastTimer = null;

    function setStatus(text, isError = false) {
      const el = document.getElementById("statusLine");
      el.textContent = text;
      el.style.color = isError ? "#ff8a8a" : "#aaa";
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");

      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 3000);
    }

    function getStatusLabel(status) {
      if (status === "complete") return "Done";
      if (status === "progress") return "In Progress";
      return "Not Started";
    }

    function getBadgeStyle(status) {
      if (status === "complete") {
        return "background:#123a24;color:#7dffb0;border:1px solid #1e6c41;";
      }
      if (status === "progress") {
        return "background:#3d2b06;color:#ffd37a;border:1px solid #9a6a00;";
      }
      return "background:#181818;color:#999;border:1px solid #333;";
    }

    function updateStats(graphData) {
      const graphNodes = Array.isArray(graphData?.nodes) ? graphData.nodes : [];
      const total = graphNodes.length;
      const complete = graphNodes.filter(n => n.status === "complete").length;
      const progress = graphNodes.filter(n => n.status === "progress").length;
      const pending = total - complete - progress;
      const percent = total ? Math.round((complete / total) * 100) : 0;

      document.getElementById("statTotal").textContent = total;
      document.getElementById("statComplete").textContent = complete;
      document.getElementById("statProgress").textContent = progress;
      document.getElementById("statPending").textContent = pending;
      document.getElementById("progressText").textContent = `Completion: ${complete} / ${total} complete (${percent}%)`;
      document.getElementById("progressFill").style.width = `${percent}%`;
    }

    function buildTreeFromGraph(graphData) {
      const graphNodes = Array.isArray(graphData?.nodes) ? graphData.nodes : [];
      const graphEdges = Array.isArray(graphData?.edges) ? graphData.edges : [];

      if (!graphNodes.length) return null;

      const byId = {};
      const childIds = new Set();
      const childrenLookup = {};

      for (const node of graphNodes) {
        byId[node.id] = {
          id: node.id,
          label: node.label || "Unnamed",
          status: node.status || "pending",
          description: node.description || "Coming Soon",
          children: []
        };
        childrenLookup[node.id] = [];
      }

      for (const edge of graphEdges) {
        if (byId[edge.from] && byId[edge.to]) {
          childrenLookup[edge.from].push(edge.to);
          childIds.add(edge.to);
        }
      }

      function attach(id) {
        const node = byId[id];
        node.children = childrenLookup[id].map(childId => attach(childId));
        return node;
      }

      let rootId = graphNodes[0].id;
      const explicitRoot = graphNodes.find(n => !childIds.has(n.id));
      if (explicitRoot) rootId = explicitRoot.id;

      return attach(rootId);
    }

    function renderCards(root) {
      const list = document.getElementById("roadmapList");
      list.innerHTML = "";

      if (!root) {
        list.innerHTML = '<div class="empty">No roadmap data available.</div>';
        return;
      }

      function walk(node, depth = 0) {
        const hasChildren = (node.children || []).length > 0;
        const isCollapsed = collapsedNodes.has(node.id);

        const card = document.createElement("div");
        card.className = `card depth-${Math.min(depth, 4)}`;

        const buttonHTML = hasChildren
          ? `<button class="branchBtn" data-node-id="${node.id}">
               ${isCollapsed ? "Expand" : "Collapse"}
             </button>`
          : "";

        card.innerHTML = `
          <div class="cardTop">
            <div class="cardTopText">
              <h3>${node.label}</h3>
              <span class="badge" style="${getBadgeStyle(node.status)}">${getStatusLabel(node.status)}</span>
            </div>
            ${buttonHTML}
          </div>
          <p>${node.description || "No description available."}</p>
        `;

        list.appendChild(card);

        if (!isCollapsed) {
          for (const child of node.children || []) {
            walk(child, depth + 1);
          }
        }
      }

      walk(root, 0);

      list.querySelectorAll(".branchBtn").forEach(btn => {
        btn.addEventListener("click", () => {
          const nodeId = Number(btn.dataset.nodeId);
          toggleBranch(nodeId);
        });
      });
    }

    function toggleBranch(nodeId) {
      if (nodeId === ROOT_ID) {
        showToast("You can't collapse the root.");
        return;
      }

      if (collapsedNodes.has(nodeId)) {
        collapsedNodes.delete(nodeId);
        setStatus("Branch expanded.");
      } else {
        collapsedNodes.add(nodeId);
        setStatus("Branch collapsed.");
      }

      const tree = buildTreeFromGraph(graphData);
      renderCards(tree);
    }

    function expandAll() {
      collapsedNodes.clear();
      const tree = buildTreeFromGraph(graphData);
      renderCards(tree);
      setStatus("All branches expanded.");
    }

    async function reloadRoadmap() {
      try {
        setStatus("Loading latest roadmap...");

        const res = await fetch(RAW_JSON_URL + "?v=" + Date.now(), {
          cache: "no-store"
        });

        if (!res.ok) {
          throw new Error("Could not load roadmap.json");
        }

        graphData = await res.json();
        updateStats(graphData);

        const tree = buildTreeFromGraph(graphData);
        renderCards(tree);
        setStatus("Loaded latest roadmap.");
      } catch (err) {
        console.error(err);
        setStatus("Failed to load roadmap.", true);
      }
    }

    reloadRoadmap();
    setInterval(reloadRoadmap, 30000);
  </script>
</body>
</html>
