<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeon Call Roadmap</title>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial;
}

/* GRAPH */
#graph {
  position:fixed;
  inset:0;
}

/* TOP PANEL */
#topPanel {
  position:fixed;
  top:18px;
  left:18px;
  width:360px;
  background:rgba(15,15,15,0.9);
  border:1px solid #2a2a2a;
  border-radius:14px;
  padding:16px;
  z-index:10;
}

/* SEARCH */
#searchInput {
  width:100%;
  padding:10px;
  background:#111;
  border:1px solid #333;
  color:#fff;
  border-radius:8px;
}

/* INFO BOX */
#infoBox {
  position:fixed;
  right:18px;
  top:18px;
  width:300px;
  background:#111;
  border:1px solid #333;
  border-radius:12px;
  padding:14px;
  display:none;
  z-index:10;
}

/* LOADING */
#loadingOverlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:100;
}

.spinner {
  width:40px;
  height:40px;
  border:3px solid #333;
  border-top:3px solid #BE1A48;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}
</style>
</head>

<body>

<div id="graph"></div>

<div id="topPanel">
  <h2>Dungeon Call</h2>
  <input id="searchInput" placeholder="Search roadmap...">
</div>

<div id="infoBox"></div>

<div id="loadingOverlay">
  <div class="spinner"></div>
</div>

<script>
const URL = "https://raw.githubusercontent.com/fluxsaloris/Roadmap/main/roadmap.json";

let network, nodes, edges, graphData;

/* COLORS */
function getColor(status){
  if(status==="complete") return {background:"#00cc66"};
  if(status==="progress") return {background:"#ffaa00"};
  return {background:"#111"};
}

/* LOAD */
async function load(){
  document.getElementById("loadingOverlay").style.display="flex";

  const res = await fetch(URL+"?v="+Date.now());
  graphData = await res.json();

  initGraph();

  document.getElementById("loadingOverlay").style.display="none";
}

/* INIT GRAPH */
function initGraph(){
  const useSaved = graphData.nodes.every(n => n.x!=null && n.y!=null);

  nodes = new vis.DataSet(graphData.nodes.map(n => ({
    id:n.id,
    label:n.label,
    x:n.x,
    y:n.y,
    fixed:useSaved,
    color:getColor(n.status)
  })));

  edges = new vis.DataSet(graphData.edges);

  network = new vis.Network(
    document.getElementById("graph"),
    {nodes,edges},
    {
      layout: useSaved ? {} : {
        hierarchical:{direction:"LR"}
      },
      physics:false
    }
  );

  network.on("click", params=>{
    if(!params.nodes.length){
      document.getElementById("infoBox").style.display="none";
      return;
    }

    const id=params.nodes[0];
    const node=graphData.nodes.find(n=>n.id==id);

    const box=document.getElementById("infoBox");
    box.innerHTML=`<h3>${node.label}</h3><p>${node.description}</p>`;
    box.style.display="block";
  });
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", e=>{
  const q=e.target.value.toLowerCase();

  const found=graphData.nodes.find(n=>n.label.toLowerCase().includes(q));
  if(!found) return;

  network.focus(found.id,{scale:1.2});
});

/* AUTO REFRESH */
document.addEventListener("visibilitychange", ()=>{
  if(!document.hidden) load();
});

load();
</script>

</body>
</html>
