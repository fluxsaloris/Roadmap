<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dungeon Call Roadmap</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: #000 !important;
      color: white;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at 30% 20%, #111, #000 70%) !important;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.85), transparent),
        radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 50% 40%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.7), transparent);
      opacity: 0.35;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      border: 2px solid #BE1A48;
      border-radius: 14px;
      pointer-events: none;
      box-shadow: 0 0 25px rgba(190, 26, 72, 0.3);
      margin: 6px;
      z-index: 2;
    }

    #graph {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: transparent !important;
    }

    #hero {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 20;
      width: min(430px, calc(100vw - 40px));
      background: rgba(15, 15, 15, 0.9);
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px rgba(0,0,0,0.35);
    }

    #hero h1 {
      margin: 0 0 6px;
      font-size: 22px;
      line-height: 1.2;
      color: #fff;
    }

    #hero p {
      margin: 0;
      color: #bbb;
      font-size: 14px;
      line-height: 1.45;
    }

    #statusLine {
      margin-top: 10px;
      font-size: 12px;
      color: #999;
    }

    #infoBox {
      position: fixed;
      width: clamp(240px, 28vw, 320px);
      max-height: min(60vh, 420px);
      overflow-y: auto;
      background: rgba(20, 20, 20, 0.96);
      border: 1px solid #2a2a2a;
      backdrop-filter: blur(12px);
      padding: 14px;
      border-radius: 14px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      z-index: 20;
      color: white;
    }

    #infoBox.hidden {
      display: none;
    }

    #infoBox h3 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.3;
      color: #fff;
    }

    #infoBox p {
      font-size: 13px;
      line-height: 1.5;
      color: #d7d7d7;
      white-space: pre-wrap;
      margin: 10px 0 0;
    }

    #closeBtn {
      position: absolute;
      top: 8px;
      right: 10px;
      cursor: pointer;
      color: #aaa;
      font-size: 14px;
    }

    #statusBadge {
      display: inline-block;
      margin: 2px 0 8px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    #controls {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      background: #111;
      color: #ddd;
      border: 1px solid #2b2b2b;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
      min-width: 140px;
    }

    button:hover {
      background: #171717;
    }

    @media (max-width: 768px) {
      #hero {
        width: calc(100vw - 36px);
      }

      #infoBox {
        width: calc(100vw - 36px);
        left: 18px !important;
        right: 18px !important;
        top: auto !important;
        bottom: 90px !important;
        max-height: 38vh;
      }

      #controls {
        right: 18px;
        bottom: 18px;
      }

      button {
        min-width: 120px;
      }
    }
  </style>
</head>
<body>
  <div id="graph"></div>

  <div id="hero">
    <h1>Dungeon Call Roadmap</h1>
    <p>Follow live development progress, see what is complete, what is in progress, and what is still planned.</p>
    <div id="statusLine">Loading roadmap...</div>
  </div>

  <div id="infoBox" class="hidden"></div>

  <div id="controls">
    <button onclick="zoomIn()">Zoom +</button>
    <button onclick="zoomOut()">Zoom -</button>
    <button onclick="resetView()">Reset</button>
    <button onclick="reloadGraph()">Refresh</button>
  </div>

  <script>
    const START_NODE_ID = 1;
    const RAW_JSON_URL = "https://raw.githubusercontent.com/fluxsaloris/Roadmap/main/roadmap.json";

    let network;
    let nodes;

    function setStatus(text, isError = false) {
      const el = document.getElementById("statusLine");
      el.textContent = text;
      el.style.color = isError ? "#ff8a8a" : "#999";
    }

    function getColor(status) {
      if (status === "complete") {
        return {
          background: "#00cc66",
          border: "#00994d",
          font: { color: "#003322" }
        };
      }
      if (status === "progress") {
        return {
          background: "#ffaa00",
          border: "#cc8800",
          font: { color: "#222" }
        };
      }
      return {
        background: "#111",
        border: "#333",
        font: { color: "#777" }
      };
    }

    function getStatusLabel(status) {
      if (status === "complete") return "Done";
      if (status === "progress") return "In Progress";
      return "Not Started";
    }

    function getStatusBadgeStyle(status) {
      if (status === "complete") {
        return "background:#123a24;color:#7dffb0;border:1px solid #1e6c41;";
      }
      if (status === "progress") {
        return "background:#3d2b06;color:#ffd37a;border:1px solid #9a6a00;";
      }
      return "background:#181818;color:#999;border:1px solid #333;";
    }

    function positionInfoBox(domX, domY) {
      const box = document.getElementById("infoBox");
      const padding = 12;

      if (window.innerWidth <= 768) {
        box.style.left = "18px";
        box.style.right = "18px";
        box.style.bottom = "90px";
        box.style.top = "auto";
        return;
      }

      requestAnimationFrame(() => {
        const rect = box.getBoundingClientRect();

        let left = domX + 16;
        let top = domY - 16;

        if (left + rect.width > window.innerWidth - padding) {
          left = domX - rect.width - 16;
        }

        if (top + rect.height > window.innerHeight - padding) {
          top = window.innerHeight - rect.height - padding;
        }

        if (top < padding) top = padding;
        if (left < padding) left = padding;

        box.style.left = left + "px";
        box.style.top = top + "px";
        box.style.right = "auto";
        box.style.bottom = "auto";
      });
    }

    async function reloadGraph() {
      try {
        setStatus("Loading latest roadmap...");

        const res = await fetch(RAW_JSON_URL + "?v=" + Date.now(), {
          cache: "no-store"
        });

        if (!res.ok) throw new Error("Could not load roadmap.json");

        const data = await res.json();

        nodes.clear();
        nodes.add(
          data.nodes.map(n => ({
            id: n.id,
            label: n.label,
            shape: "box",
            margin: 14,
            color: getColor(n.status),
            description: n.description,
            status: n.status
          }))
        );

        network.setData({
          nodes: nodes,
          edges: data.edges
        });

        setTimeout(() => {
          network.focus(START_NODE_ID, { scale: 1.2 });
        }, 100);

        setStatus("Loaded latest roadmap.");
      } catch (err) {
        console.error(err);
        setStatus("Failed to load roadmap.", true);
        alert("Failed to load roadmap.");
      }
    }

    function zoomIn() {
      network.moveTo({ scale: network.getScale() * 1.2 });
    }

    function zoomOut() {
      network.moveTo({ scale: network.getScale() * 0.8 });
    }

    function resetView() {
      network.focus(START_NODE_ID, { scale: 1.2 });
    }

    nodes = new vis.DataSet();

    network = new vis.Network(
      document.getElementById("graph"),
      { nodes: nodes, edges: [] },
      {
        layout: {
          hierarchical: {
            direction: "LR",
            levelSeparation: 250,
            nodeSpacing: 200
          }
        },
        physics: false,
        interaction: {
          dragNodes: false
        }
      }
    );

    network.on("click", function(params) {
      const info = document.getElementById("infoBox");

      if (!params.nodes.length) {
        info.classList.add("hidden");
        return;
      }

      const node = nodes.get(params.nodes[0]);

      info.innerHTML =
        '<div id="closeBtn">✕</div>' +
        `<h3>${node.label}</h3>` +
        `<div id="statusBadge" style="${getStatusBadgeStyle(node.status)}">${getStatusLabel(node.status)}</div>` +
        `<p>${node.description || "No description available."}</p>`;

      info.classList.remove("hidden");
      positionInfoBox(params.pointer.DOM.x, params.pointer.DOM.y);

      document.getElementById("closeBtn").onclick = () => {
        info.classList.add("hidden");
      };
    });

    reloadGraph();
    setInterval(reloadGraph, 30000);
  </script>
</body>
</html>
