<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dungeon Call Roadmap</title>
  <script>
    if (window.innerWidth <= 768) {
      window.location.replace("./viewer-mobile.html");
    }
  </script>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: #000 !important;
      color: white;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
      background: radial-gradient(circle at 30% 20%, #111, #000 70%) !important;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.85), transparent),
        radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 50% 40%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.7), transparent);
      opacity: 0.35;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      border: 2px solid #BE1A48;
      border-radius: 14px;
      pointer-events: none;
      box-shadow: 0 0 25px rgba(190, 26, 72, 0.3);
      margin: 6px;
      z-index: 2;
    }

    #graph {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: transparent !important;
    }

    #hero {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 20;
      width: min(470px, calc(100vw - 40px));
      background: rgba(15, 15, 15, 0.9);
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px rgba(0,0,0,0.35);
    }

    #hero h1 {
      margin: 0 0 6px;
      font-size: 22px;
      line-height: 1.2;
      color: #fff;
    }

    #hero p {
      margin: 0 0 10px;
      color: #bbb;
      font-size: 14px;
      line-height: 1.45;
    }

    #statusLine {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
    }

    #statsBar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .statCard {
      background: rgba(20,20,20,0.9);
      border: 1px solid #2c2c2c;
      border-radius: 10px;
      padding: 10px 12px;
      min-width: 92px;
    }

    .statValue {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .statLabel {
      margin-top: 3px;
      font-size: 11px;
      color: #9d9d9d;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    #progressWrap {
      margin-top: 12px;
    }

    #progressText {
      font-size: 12px;
      color: #bbb;
      margin-bottom: 6px;
    }

    #progressTrack {
      width: 100%;
      height: 10px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      overflow: hidden;
    }

    #progressFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #BE1A48, #ff4f86);
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    #infoBox {
      position: fixed;
      width: clamp(240px, 28vw, 340px);
      max-height: min(65vh, 460px);
      overflow-y: auto;
      background: rgba(20, 20, 20, 0.96);
      border: 1px solid #2a2a2a;
      backdrop-filter: blur(12px);
      padding: 14px;
      border-radius: 14px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      z-index: 20;
      color: white;
    }

    #infoBox.hidden {
      display: none;
    }

    #infoBox h3 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.3;
      color: #fff;
    }

    #infoBox p {
      font-size: 13px;
      line-height: 1.5;
      color: #d7d7d7;
      white-space: pre-wrap;
      margin: 10px 0 0;
    }

    #closeBtn {
      position: absolute;
      top: 8px;
      right: 10px;
      cursor: pointer;
      color: #aaa;
      font-size: 14px;
    }

    #statusBadge {
      display: inline-block;
      margin: 2px 0 8px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .smallNote {
      margin-top: 10px;
      font-size: 12px;
      color: #999;
      line-height: 1.4;
    }

    #controls {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      background: #111;
      color: #ddd;
      border: 1px solid #2b2b2b;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
      min-width: 150px;
    }

    button:hover {
      background: #171717;
    }
  </style>
</head>
<body>
  <div id="graph"></div>

  <div id="hero">
    <h1>Dungeon Call Roadmap</h1>
    <p>Follow live development progress, see what is complete, what is in progress, and what is still planned.</p>

    <div id="statsBar">
      <div class="statCard">
        <div class="statValue" id="statTotal">0</div>
        <div class="statLabel">Total</div>
      </div>
      <div class="statCard">
        <div class="statValue" id="statComplete">0</div>
        <div class="statLabel">Done</div>
      </div>
      <div class="statCard">
        <div class="statValue" id="statProgress">0</div>
        <div class="statLabel">Progress</div>
      </div>
      <div class="statCard">
        <div class="statValue" id="statPending">0</div>
        <div class="statLabel">Pending</div>
      </div>
    </div>

    <div id="progressWrap">
      <div id="progressText">Completion: 0%</div>
      <div id="progressTrack">
        <div id="progressFill"></div>
      </div>
    </div>

    <div id="statusLine">Loading roadmap...</div>
  </div>

  <div id="infoBox" class="hidden"></div>

  <div id="controls">
    <button onclick="toggleSelectedBranch()">Toggle Branch</button>
    <button onclick="expandAll()">Expand All</button>
    <button onclick="zoomIn()">Zoom +</button>
    <button onclick="zoomOut()">Zoom -</button>
    <button onclick="resetView()">Reset</button>
    <button onclick="reloadGraph()">Refresh</button>
  </div>

  <script>
    const START_NODE_ID = 1;
    const RAW_JSON_URL = "https://raw.githubusercontent.com/fluxsaloris/Roadmap/main/roadmap.json";

    let network;
    let nodes;
    let edges;
    let fullGraphData = null;
    let selectedNodeId = null;
    let hasInitialFocused = false;

    const collapsedNodes = new Set();
    const originalNodeMap = new Map();
    const childMap = new Map();

    function setStatus(text, isError = false) {
      const el = document.getElementById("statusLine");
      el.textContent = text;
      el.style.color = isError ? "#ff8a8a" : "#999";
    }

    function getColor(status) {
      if (status === "complete") {
        return {
          background: "#00cc66",
          border: "#00994d",
          font: { color: "#003322" }
        };
      }
      if (status === "progress") {
        return {
          background: "#ffaa00",
          border: "#cc8800",
          font: { color: "#222" }
        };
      }
      return {
        background: "#111",
        border: "#333",
        font: { color: "#777" }
      };
    }

    function getStatusLabel(status) {
      if (status === "complete") return "Done";
      if (status === "progress") return "In Progress";
      return "Not Started";
    }

    function getStatusBadgeStyle(status) {
      if (status === "complete") {
        return "background:#123a24;color:#7dffb0;border:1px solid #1e6c41;";
      }
      if (status === "progress") {
        return "background:#3d2b06;color:#ffd37a;border:1px solid #9a6a00;";
      }
      return "background:#181818;color:#999;border:1px solid #333;";
    }

    function updateStats(data) {
      const graphNodes = Array.isArray(data?.nodes) ? data.nodes : [];
      const total = graphNodes.length;
      const complete = graphNodes.filter(n => n.status === "complete").length;
      const progress = graphNodes.filter(n => n.status === "progress").length;
      const pending = total - complete - progress;
      const percent = total ? Math.round((complete / total) * 100) : 0;

      document.getElementById("statTotal").textContent = total;
      document.getElementById("statComplete").textContent = complete;
      document.getElementById("statProgress").textContent = progress;
      document.getElementById("statPending").textContent = pending;
      document.getElementById("progressText").textContent = `Completion: ${complete} / ${total} complete (${percent}%)`;
      document.getElementById("progressFill").style.width = `${percent}%`;
    }

    function positionInfoBox(domX, domY) {
      const box = document.getElementById("infoBox");
      const padding = 12;

      requestAnimationFrame(() => {
        const rect = box.getBoundingClientRect();

        let left = domX + 16;
        let top = domY - 16;

        if (left + rect.width > window.innerWidth - padding) {
          left = domX - rect.width - 16;
        }

        if (top + rect.height > window.innerHeight - padding) {
          top = window.innerHeight - rect.height - padding;
        }

        if (top < padding) top = padding;
        if (left < padding) left = padding;

        box.style.left = left + "px";
        box.style.top = top + "px";
        box.style.right = "auto";
        box.style.bottom = "auto";
      });
    }

    function buildMaps(data) {
      originalNodeMap.clear();
      childMap.clear();

      for (const node of data.nodes) {
        originalNodeMap.set(node.id, { ...node });
        childMap.set(node.id, []);
      }

      for (const edge of data.edges) {
        if (!childMap.has(edge.from)) childMap.set(edge.from, []);
        childMap.get(edge.from).push(edge.to);
      }
    }

    function getDescendants(rootId) {
      const result = [];
      const stack = [...(childMap.get(rootId) || [])];

      while (stack.length) {
        const id = stack.pop();
        result.push(id);
        const children = childMap.get(id) || [];
        for (const child of children) stack.push(child);
      }

      return result;
    }

    function applyCollapseState() {
      if (!fullGraphData) return;

      const hiddenNodeIds = new Set();

      for (const collapsedId of collapsedNodes) {
        for (const descendant of getDescendants(collapsedId)) {
          hiddenNodeIds.add(descendant);
        }
      }

      const nodeUpdates = [];
      for (const node of fullGraphData.nodes) {
        const original = originalNodeMap.get(node.id);
        const isCollapsed = collapsedNodes.has(node.id);
        nodeUpdates.push({
          id: node.id,
          hidden: hiddenNodeIds.has(node.id),
          label: isCollapsed ? `${original.label}  [+/-]` : original.label
        });
      }

      const edgeUpdates = [];
      for (const edge of fullGraphData.edges) {
        edgeUpdates.push({
          id: edge.id,
          hidden: hiddenNodeIds.has(edge.from) || hiddenNodeIds.has(edge.to)
        });
      }

      nodes.update(nodeUpdates);
      edges.update(edgeUpdates);
    }

    async function reloadGraph() {
      try {
        setStatus("Loading latest roadmap...");

        const res = await fetch(RAW_JSON_URL + "?v=" + Date.now(), {
          cache: "no-store"
        });

        if (!res.ok) throw new Error("Could not load roadmap.json");

        const data = await res.json();
        fullGraphData = {
          nodes: data.nodes.map(n => ({
            id: n.id,
            label: n.label,
            shape: "box",
            margin: 14,
            color: getColor(n.status),
            description: n.description,
            status: n.status,
            hidden: false
          })),
          edges: data.edges.map((e, index) => ({
            id: index + 1,
            from: e.from,
            to: e.to,
            hidden: false
          }))
        };

        buildMaps(data);
        updateStats(data);

        nodes.clear();
        edges.clear();
        nodes.add(fullGraphData.nodes);
        edges.add(fullGraphData.edges);

        applyCollapseState();

        if (!hasInitialFocused) {
          hasInitialFocused = true;
          setTimeout(() => {
            network.focus(START_NODE_ID, {
              scale: 1.2,
              animation: false
            });
          }, 50);
        }

        setStatus("Loaded latest roadmap.");
      } catch (err) {
        console.error(err);
        setStatus("Failed to load roadmap.", true);
        alert("Failed to load roadmap.");
      }
    }

    function toggleSelectedBranch() {
      if (!selectedNodeId) {
        alert("Select a node first.");
        return;
      }

      if (collapsedNodes.has(selectedNodeId)) {
        collapsedNodes.delete(selectedNodeId);
        setStatus("Branch expanded.");
      } else {
        collapsedNodes.add(selectedNodeId);
        setStatus("Branch collapsed.");
      }

      applyCollapseState();
    }

    function expandAll() {
      collapsedNodes.clear();
      applyCollapseState();
      setStatus("All branches expanded.");
    }

    function zoomIn() {
      network.moveTo({ scale: network.getScale() * 1.2 });
    }

    function zoomOut() {
      network.moveTo({ scale: network.getScale() * 0.8 });
    }

    function resetView() {
      network.focus(START_NODE_ID, { scale: 1.2, animation: false });
      setStatus("View reset.");
    }

    nodes = new vis.DataSet();
    edges = new vis.DataSet();

    network = new vis.Network(
      document.getElementById("graph"),
      { nodes: nodes, edges: edges },
      {
        layout: {
          hierarchical: {
            direction: "LR",
            levelSeparation: 250,
            nodeSpacing: 200
          }
        },
        physics: false,
        interaction: {
          dragNodes: false
        }
      }
    );

    network.on("click", function(params) {
      const info = document.getElementById("infoBox");

      if (!params.nodes.length) {
        selectedNodeId = null;
        info.classList.add("hidden");
        return;
      }

      selectedNodeId = params.nodes[0];
      const node = nodes.get(selectedNodeId);

      info.innerHTML =
        '<div id="closeBtn">✕</div>' +
        `<h3>${node.label.replace("  [+/-]", "")}</h3>` +
        `<div id="statusBadge" style="${getStatusBadgeStyle(node.status)}">${getStatusLabel(node.status)}</div>` +
        `<p>${node.description || "No description available."}</p>` +
        `<div class="smallNote">Use “Toggle Branch” to collapse or expand this node’s descendants.</div>`;

      info.classList.remove("hidden");
      positionInfoBox(params.pointer.DOM.x, params.pointer.DOM.y);

      document.getElementById("closeBtn").onclick = () => {
        info.classList.add("hidden");
      };
    });

    reloadGraph();
    setInterval(reloadGraph, 30000);
  </script>
</body>
</html>
