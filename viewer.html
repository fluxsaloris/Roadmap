<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dungeon Call Roadmap</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
      background: radial-gradient(circle at 30% 20%, #111, #000 70%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        radial-gradient(1px 1px at 10% 20%, white, transparent),
        radial-gradient(1px 1px at 30% 70%, white, transparent),
        radial-gradient(1.5px 1.5px at 50% 40%, white, transparent),
        radial-gradient(1px 1px at 80% 60%, white, transparent);
      opacity: 0.5;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      border: 2px solid #BE1A48;
      border-radius: 14px;
      pointer-events: none;
      box-shadow: 0 0 25px rgba(190, 26, 72, 0.35);
      margin: 6px;
    }

    #graph {
      position: fixed;
      inset: 0;
    }

    #titleBar {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
      background: rgba(15, 15, 15, 0.88);
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 14px;
      max-width: min(420px, calc(100vw - 40px));
      backdrop-filter: blur(8px);
      box-shadow: 0 0 15px rgba(0,0,0,0.35);
    }

    #titleBar h1 {
      margin: 0 0 4px;
      font-size: 18px;
      font-weight: 700;
    }

    #titleBar p {
      margin: 0;
      font-size: 13px;
      color: #bbb;
      line-height: 1.4;
    }

    #infoBox {
      position: fixed;
      width: clamp(220px, 70vw, 300px);
      max-height: min(55vh, 360px);
      overflow-y: auto;
      background: rgba(20, 20, 20, 0.94);
      backdrop-filter: blur(12px);
      padding: 14px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      z-index: 20;
    }

    #infoBox.hidden {
      display: none;
    }

    #infoBox h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    #infoBox p {
      font-size: 13px;
      line-height: 1.45;
      color: #ddd;
      white-space: pre-wrap;
    }

    #closeBtn {
      position: absolute;
      top: 6px;
      right: 8px;
      cursor: pointer;
      color: #aaa;
      font-size: 14px;
    }

    #statusBadge {
      display: inline-block;
      margin: 4px 0 10px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    #controls {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 20;
    }

    button {
      display: block;
      width: 140px;
      margin: 4px 0;
      padding: 8px 10px;
      background: #111;
      color: #ccc;
      border: 1px solid #2b2b2b;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #171717;
    }
  </style>
</head>
<body>
  <div id="graph"></div>

  <div id="titleBar">
    <h1>Dungeon Call Roadmap</h1>
    <p>Track live development progress and explore what is complete, in progress, and still planned.</p>
  </div>

  <div id="infoBox" class="hidden"></div>

  <div id="controls">
    <button onclick="zoomIn()">Zoom +</button>
    <button onclick="zoomOut()">Zoom -</button>
    <button onclick="resetView()">Reset</button>
    <button onclick="reloadGraph()">Refresh</button>
  </div>

  <script>
    const START_NODE_ID = 1;
    const RAW_JSON_URL = "https://raw.githubusercontent.com/fluxsaloris/Roadmap/main/roadmap.json";

    let network;
    let nodes;

    function getColor(status) {
      if (status === "complete") {
        return { background: "#00cc66", border: "#00994d", font: { color: "#003322" } };
      }
      if (status === "progress") {
        return { background: "#ffaa00", border: "#cc8800", font: { color: "#222" } };
      }
      return { background: "#111", border: "#333", font: { color: "#777" } };
    }

    function getStatusLabel(status) {
      if (status === "complete") return "Done";
      if (status === "progress") return "In Progress";
      return "Not Started";
    }

    function getStatusBadgeStyle(status) {
      if (status === "complete") {
        return "background:#123a24;color:#7dffb0;border:1px solid #1e6c41;";
      }
      if (status === "progress") {
        return "background:#3d2b06;color:#ffd37a;border:1px solid #9a6a00;";
      }
      return "background:#181818;color:#999;border:1px solid #333;";
    }

    function positionInfoBox(domX, domY) {
      const box = document.getElementById("infoBox");
      const padding = 10;

      requestAnimationFrame(() => {
        const rect = box.getBoundingClientRect();

        let left = domX + 16;
        let top = domY - 16;

        if (left + rect.width > window.innerWidth - padding) {
          left = domX - rect.width - 16;
        }

        if (top + rect.height > window.innerHeight - padding) {
          top = window.innerHeight - rect.height - padding;
        }

        if (top < padding) top = padding;
        if (left < padding) left = padding;

        box.style.left = left + "px";
        box.style.top = top + "px";
      });
    }

    async function reloadGraph() {
      try {
        const res = await fetch(RAW_JSON_URL + "?v=" + Date.now(), {
          cache: "no-store"
        });

        if (!res.ok) {
          throw new Error("Could not load roadmap.json");
        }

        const data = await res.json();

        nodes.clear();
        nodes.add(
          data.nodes.map(n => ({
            id: n.id,
            label: n.label,
            shape: "box",
            margin: 14,
            color: getColor(n.status),
            description: n.description,
            status: n.status
          }))
        );

        network.setData({
          nodes: nodes,
          edges: data.edges
        });

        setTimeout(() => {
          network.focus(START_NODE_ID, { scale: 1.2 });
        }, 100);
      } catch (err) {
        console.error(err);
        alert("Failed to load roadmap.");
      }
    }

    function zoomIn() {
      network.moveTo({ scale: network.getScale() * 1.2 });
    }

    function zoomOut() {
      network.moveTo({ scale: network.getScale() * 0.8 });
    }

    function resetView() {
      network.focus(START_NODE_ID, { scale: 1.2 });
    }

    nodes = new vis.DataSet();

    network = new vis.Network(
      document.getElementById("graph"),
      { nodes: nodes, edges: [] },
      {
        layout: {
          hierarchical: {
            direction: "LR",
            levelSeparation: 250,
            nodeSpacing: 200
          }
        },
        physics: false,
        interaction: {
          dragNodes: false
        }
      }
    );

    network.on("click", function(params) {
      const info = document.getElementById("infoBox");

      if (!params.nodes.length) {
        info.classList.add("hidden");
        return;
      }

      const node = nodes.get(params.nodes[0]);

      info.innerHTML =
        '<div id="closeBtn">✕</div>' +
        `<h3>${node.label}</h3>` +
        `<div id="statusBadge" style="${getStatusBadgeStyle(node.status)}">${getStatusLabel(node.status)}</div>` +
        `<p>${node.description || "No description available."}</p>`;

      info.classList.remove("hidden");
      positionInfoBox(params.pointer.DOM.x, params.pointer.DOM.y);

      document.getElementById("closeBtn").onclick = () => {
        info.classList.add("hidden");
      };
    });

    reloadGraph();
    setInterval(reloadGraph, 30000);
  </script>
</body>
</html>
